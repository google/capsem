# -- Guest Environment -------------------------------------------------------

[settings.guest]
name = "Guest Environment"
description = "Guest VM shell and environment configuration"
collapsed = false

[settings.guest.shell]
name = "Shell"
description = "Guest shell settings"

[settings.guest.shell.term]
name = "TERM"
description = "Terminal type for the guest shell."
type = "text"
default = "xterm-256color"

[settings.guest.shell.term.meta]
env_vars = ["TERM"]

[settings.guest.shell.home]
name = "HOME"
description = "Home directory for the guest shell."
type = "text"
default = "/root"

[settings.guest.shell.home.meta]
env_vars = ["HOME"]

[settings.guest.shell.path]
name = "PATH"
description = "Executable search path for the guest shell."
type = "text"
default = "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[settings.guest.shell.path.meta]
env_vars = ["PATH"]

[settings.guest.shell.lang]
name = "LANG"
description = "Locale for the guest shell."
type = "text"
default = "C"

[settings.guest.shell.lang.meta]
env_vars = ["LANG"]

[settings.guest.tls]
name = "TLS"
description = "TLS certificate configuration"

[settings.guest.tls.ca_bundle]
name = "CA bundle path"
description = "Path to the CA certificate bundle in the guest. Injected as REQUESTS_CA_BUNDLE, NODE_EXTRA_CA_CERTS, and SSL_CERT_FILE."
type = "text"
default = "/etc/ssl/certs/ca-certificates.crt"

[settings.guest.tls.ca_bundle.meta]
env_vars = ["REQUESTS_CA_BUNDLE", "NODE_EXTRA_CA_CERTS", "SSL_CERT_FILE"]

# -- Network -----------------------------------------------------------------

[settings.network]
name = "Network"
description = "Network access control and domain filtering"
collapsed = false

[settings.network.default_action]
name = "Default action"
description = "Action for domains not in any allow/block list."
type = "text"
default = "deny"

[settings.network.default_action.meta]
choices = ["allow", "deny"]

[settings.network.custom_allow]
name = "Custom allowed domains"
description = "Comma-separated domain patterns to allow. Wildcards supported (*.example.com)."
type = "text"
default = "elie.net, *.elie.net"

[settings.network.custom_block]
name = "Custom blocked domains"
description = "Comma-separated domain patterns to block. Takes priority over custom allow list."
type = "text"
default = ""

[settings.network.max_body_size_mb]
name = "Max transfer size"
description = "Maximum body size in Megabytes (MB) for network requests/responses. Default 1024 (1GB)."
type = "number"
default = 1024

[settings.network.max_body_size_mb.meta]
min = 0
max = 102400

# -- VM ----------------------------------------------------------------------

[settings.vm]
name = "VM"
description = "Virtual machine resource configuration"
collapsed = false

[settings.vm.log_bodies]
name = "Log request bodies"
description = "Capture request/response bodies in telemetry."
type = "bool"
default = false

[settings.vm.max_body_capture]
name = "Max body capture"
description = "Maximum bytes of body to capture in telemetry."
type = "number"
default = 4096

[settings.vm.max_body_capture.meta]
min = 0
max = 1048576

[settings.vm.retention_days]
name = "Session retention"
description = "Number of days to retain session data."
type = "number"
default = 30

[settings.vm.retention_days.meta]
min = 1
max = 365

[settings.vm.cpu_count]
name = "CPU cores"
description = "Number of CPU cores allocated to the VM."
type = "number"
default = 4

[settings.vm.cpu_count.meta]
min = 1
max = 8

[settings.vm.ram_gb]
name = "RAM"
description = "Amount of RAM allocated to the VM in GB."
type = "number"
default = 4

[settings.vm.ram_gb.meta]
min = 1
max = 16

[settings.vm.scratch_disk_size_gb]
name = "Scratch disk size"
description = "Size of the ephemeral scratch disk in GB."
type = "number"
default = 16

[settings.vm.scratch_disk_size_gb.meta]
min = 1
max = 128

[settings.vm.max_sessions]
name = "Maximum sessions"
description = "Keep at most this many sessions (oldest culled first)."
type = "number"
default = 100

[settings.vm.max_sessions.meta]
min = 1
max = 10000

[settings.vm.max_disk_gb]
name = "Maximum disk usage"
description = "Maximum total disk usage for all sessions in GB."
type = "number"
default = 100

[settings.vm.max_disk_gb.meta]
min = 1
max = 1000

[settings.vm.terminated_retention_days]
name = "Terminated session retention"
description = "Days to keep terminated session records in the index. After this, the record is permanently deleted."
type = "number"
default = 365

[settings.vm.terminated_retention_days.meta]
min = 30
max = 3650

