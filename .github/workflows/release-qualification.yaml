name: Release qualification
run-name: Qualify release ${{ inputs.channel }} ${{ inputs.sha }}

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact untagged main commit to qualify
        required: true
        type: string
      channel:
        description: Exact release channel whose install manifest is qualified
        required: true
        type: choice
        options:
          - stable
          - nightly

concurrency:
  group: release-qualification-${{ inputs.channel }}-${{ inputs.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  qualification:
    # TEMPORARILY DISABLED: macOS full gate. GitHub-hosted macOS runners cannot
    # provide nested Virtualization.framework access for Capsem/Colima, and the
    # repository has no physical macOS runner. Restore a parallel macOS `just
    # test` job when that runner exists. This exact-SHA Linux qualification is
    # release-blocking; final tags and both package jobs require its success.
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      CAPSEM_REQUIRE_LINUX_DEB_PROOF: "1"
      CAPSEM_INSTALL_MANIFEST_URL: https://release.capsem.org/assets/${{ inputs.channel }}/manifest.json
      CAPSEM_INSTALL_CHANNEL: ${{ inputs.channel }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Verify exact untagged candidate identity
        env:
          EXPECTED_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_REF_TYPE" = branch
          test "$GITHUB_REF_NAME" = main
          test "$GITHUB_SHA" = "$EXPECTED_SHA"
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git tag --points-at HEAD 'v*')"

      - uses: extractions/setup-just@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: full-release-qualification-linux

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5

      # `just test` owns the complete arm64 + x86_64 asset-build matrix. The
      # x86_64 qualification runner therefore needs real arm64 binfmt support;
      # this is runner setup, not a second hidden build path.
      - name: Enable cross-architecture container execution
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Linux full-gate system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            musl-tools \
            pkg-config \
            xdg-utils \
            xvfb \
            zstd

      - name: Enable KVM
        run: |
          set -euxo pipefail
          # Hosted runners expose KVM directly. Requiring the real character
          # device avoids depending on whether a userspace udev daemon happens
          # to accept control/trigger requests on this runner instance.
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm
          test -r /dev/kvm -a -w /dev/kvm
          sudo modprobe vhost_vsock
          test -c /dev/vhost-vsock
          sudo chmod 0666 /dev/vhost-vsock
          test -r /dev/vhost-vsock -a -w /dev/vhost-vsock

      - name: Validate public install manifest with candidate runtime
        run: |
          set -euo pipefail
          cargo build -p capsem
          RUNTIME_HOME="$(mktemp -d)"
          mkdir -p "$RUNTIME_HOME/.capsem/bin" "$RUNTIME_HOME/.capsem/assets"
          cp target/debug/capsem "$RUNTIME_HOME/.capsem/bin/capsem"
          python3 - "$RUNTIME_HOME/.capsem/assets/manifest-metadata.json" <<'PY'
          import json
          import os
          import pathlib
          import sys

          pathlib.Path(sys.argv[1]).write_text(json.dumps({
              "schema": "capsem.manifest_metadata.v1",
              "manifest_url": os.environ["CAPSEM_INSTALL_MANIFEST_URL"],
              "channel": os.environ["CAPSEM_INSTALL_CHANNEL"],
          }, indent=2) + "\n")
          PY
          HOME="$RUNTIME_HOME" "$RUNTIME_HOME/.capsem/bin/capsem" update --check

      - name: Complete canonical release gate (just test)
        run: just test

      - name: Upload full-gate artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-qualification-linux-${{ inputs.sha }}-${{ github.run_attempt }}
          path: |
            test-artifacts/
            frontend/test-artifacts/
            target/build.log
          retention-days: 14
          if-no-files-found: ignore
