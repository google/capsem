name: Publish Asset Channel

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: false
        default: stable
      dist_artifact:
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Publish asset channel
    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CHANNEL: ${{ inputs.channel || 'stable' }}
      DIST_DIR: target/release-channel

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Download generated asset channel
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist_artifact }}
          path: target/release-channel/

      - name: Require generated asset channel
        run: |
          test -f "$DIST_DIR/index.html"
          test -f "$DIST_DIR/health.json"
          test -f "$DIST_DIR/_headers"
          test -f "$DIST_DIR/assets/$CHANNEL/manifest.json"
          test -d "$DIST_DIR/assets/releases"

      - name: Check asset channel
        run: |
          cargo run -p capsem-admin -- assets channel check \
            --channel "$CHANNEL" \
            --dist "$DIST_DIR"

      - name: Require Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is required to deploy release.capsem.org"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required to deploy release.capsem.org"
            exit 1
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy target/release-channel/ --project-name=capsem-release --branch=main

      - name: Smoke public asset channel
        env:
          RELEASE_SITE_URL: https://release.capsem.org
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "Checking $RELEASE_SITE_URL (attempt $attempt)..."
            if curl -fsSL "$RELEASE_SITE_URL/" -o /tmp/release-index.html \
              && curl -fsSL "$RELEASE_SITE_URL/health.json" -o /tmp/release-health.json \
              && curl -fsSL "$RELEASE_SITE_URL/assets/$CHANNEL/manifest.json" -o /tmp/release-manifest.json \
              && uv run python3 - <<'PY'
          import hashlib
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          import blake3

          channel = os.environ["CHANNEL"]
          release_site_url = os.environ["RELEASE_SITE_URL"].rstrip("/")
          health = json.load(open("/tmp/release-health.json", encoding="utf-8"))
          manifest = json.load(open("/tmp/release-manifest.json", encoding="utf-8"))
          index = open("/tmp/release-index.html", encoding="utf-8").read()

          def fetch_bytes(url):
              with urllib.request.urlopen(url, timeout=20) as response:
                  return response.read()

          def fetch_headers(url):
              request = urllib.request.Request(url, method="HEAD")
              with urllib.request.urlopen(request, timeout=20) as response:
                  return {key.lower(): value for key, value in response.headers.items()}

          def resolve_release_url(url):
              parsed = urllib.parse.urlparse(url)
              if parsed.scheme in ("http", "https"):
                  return url
              if url.startswith("/"):
                  return f"{release_site_url}{url}"
              raise ValueError(f"evidence URL must be absolute or release-site relative: {url}")

          def release_url_path(url):
              parsed = urllib.parse.urlparse(url)
              if parsed.scheme in ("http", "https"):
                  return parsed.path
              return url

          def check_cache_header(label, url, directives):
              try:
                  headers = fetch_headers(url)
              except Exception as error:
                  failures.append(f"{label} {url} header fetch failed: {error}")
                  return
              cache_control = headers.get("cache-control", "").lower()
              for directive in directives:
                  if directive not in cache_control:
                      failures.append(f"{label} {url} Cache-Control must contain {directive}")

          def check_evidence_artifact(item, hash_key, algorithm, label, expected_document=None):
              url = item.get("url")
              expected_hash = item.get(hash_key)
              expected_size = item.get("size")
              if not isinstance(url, str):
                  failures.append(f"{label} missing url")
                  return
              if not isinstance(expected_hash, str):
                  failures.append(f"{label} {url} missing {hash_key}")
                  return
              if not isinstance(expected_size, int):
                  failures.append(f"{label} {url} missing size")
                  return
              try:
                  data = fetch_bytes(resolve_release_url(url))
              except Exception as error:
                  failures.append(f"{label} {url} fetch failed: {error}")
                  return
              if len(data) != expected_size:
                  failures.append(f"{label} {url} size mismatch")
              if algorithm == "sha256":
                  actual_hash = hashlib.sha256(data).hexdigest()
              elif algorithm == "blake3":
                  actual_hash = blake3.blake3(data).hexdigest()
              else:
                  failures.append(f"{label} {url} unsupported hash algorithm {algorithm}")
                  return
              if actual_hash != expected_hash:
                  failures.append(f"{label} {url} {algorithm} mismatch")
              if expected_document is not None:
                  try:
                      document = json.loads(data)
                  except Exception as error:
                      failures.append(f"{label} {url} invalid JSON: {error}")
                      return
                  if not isinstance(document, dict):
                      failures.append(f"{label} {url} document is not an object")
                      return
                  if expected_document == "spdx":
                      if document.get("spdxVersion") != "SPDX-2.3":
                          failures.append(f"{label} {url} spdxVersion mismatch")
                      return
                  if expected_document == "cyclonedx":
                      if document.get("bomFormat") != "CycloneDX":
                          failures.append(f"{label} {url} bomFormat mismatch")
                      return
                  failures.append(
                      f"{label} {url} unsupported evidence document {expected_document}"
                  )

          def attestation_predicate_evidence_urls(attestation, subjects, host_binary_by_url, asset_by_url, host_sbom_urls, vm_obom_urls):
              scope = attestation.get("scope")
              if scope == "vm_assets":
                  return vm_obom_urls, "VM OBOM evidence"
              if scope == "host_binaries":
                  return host_sbom_urls, "host SBOM evidence"

              string_subjects = {subject for subject in subjects if isinstance(subject, str)}
              has_vm_asset_subject = any(subject in asset_by_url for subject in string_subjects)
              has_host_binary_subject = any(subject in host_binary_by_url for subject in string_subjects)
              if has_vm_asset_subject and not has_host_binary_subject:
                  return vm_obom_urls, "VM OBOM evidence"
              if has_host_binary_subject and not has_vm_asset_subject:
                  return host_sbom_urls, "host SBOM evidence"
              return host_sbom_urls | vm_obom_urls, "host SBOM or VM OBOM evidence"

          def attestation_expected_rails():
              return {
                  "github_attestations_host": {
                      "scope": "host_binaries",
                      "workflow": ".github/workflows/release.yaml",
                  },
                  "github_attestations_host_sbom": {
                      "scope": "host_sbom",
                      "workflow": ".github/workflows/release.yaml",
                  },
                  "github_attestations_vm_assets": {
                      "scope": "vm_assets",
                      "workflow": ".github/workflows/release-assets.yaml",
                  },
              }

          def current_asset_file_refs(asset_version, release):
              if not isinstance(asset_version, str):
                  return []
              if not isinstance(release, dict):
                  failures.append("manifest current asset release missing or not an object")
                  return []
              arches = release.get("arches")
              if not isinstance(arches, dict):
                  failures.append("manifest current asset release arches missing or not an object")
                  return []

              refs = []
              for arch, assets in arches.items():
                  if not isinstance(arch, str) or not isinstance(assets, dict):
                      failures.append("manifest current asset arch entry malformed")
                      continue
                  for logical_name, entry in assets.items():
                      if not isinstance(logical_name, str) or not isinstance(entry, dict):
                          failures.append("manifest current asset file entry malformed")
                          continue
                      url = f"/assets/releases/{asset_version}/{arch}-{logical_name}"
                      hash_value = entry.get("hash")
                      size = entry.get("size")
                      if not isinstance(hash_value, str):
                          failures.append(f"manifest asset file {url} hash missing")
                          continue
                      if not isinstance(size, int):
                          failures.append(f"manifest asset file {url} size missing")
                          continue
                      refs.append({
                          "arch": arch,
                          "logical_name": logical_name,
                          "url": url,
                          "hash": hash_value,
                          "size": size,
                      })
              return refs

          def check_health_asset_files(asset_files, expected_asset_files):
              if not isinstance(asset_files, list):
                  failures.append("health asset files missing or not a list")
                  return

              files_by_url = {}
              for item in asset_files:
                  if not isinstance(item, dict):
                      failures.append("health asset file entry is not an object")
                      continue
                  url = item.get("url")
                  if not isinstance(url, str):
                      failures.append("health asset file entry missing url")
                      continue
                  files_by_url[url] = item

              expected_urls = {item["url"] for item in expected_asset_files}
              for expected in expected_asset_files:
                  url = expected["url"]
                  public_file = files_by_url.get(url)
                  if public_file is None:
                      failures.append(f"health missing asset file {url}")
                      continue
                  for field in ("arch", "logical_name", "hash", "size"):
                      if public_file.get(field) != expected[field]:
                          failures.append(f"health asset {field} mismatch for {url}")

              for url in sorted(set(files_by_url) - expected_urls):
                  failures.append(f"health unexpected asset file {url}")

          def current_binary_file_refs(binary_version, release):
              if not isinstance(binary_version, str):
                  return []
              if not isinstance(release, dict):
                  failures.append("manifest current binary release missing or not an object")
                  return []
              files = release.get("files", [])
              if not isinstance(files, list):
                  failures.append("manifest current binary release files missing or not a list")
                  return []

              base = os.environ.get("CAPSEM_RELEASE_URL") or "https://github.com/google/capsem/releases/download"
              release_base = f"{base.rstrip('/')}/v{binary_version}"
              refs = []
              for item in files:
                  if not isinstance(item, dict):
                      failures.append("manifest binary file entry is not an object")
                      continue
                  name = item.get("name")
                  sha256 = item.get("sha256")
                  size = item.get("size")
                  if not isinstance(name, str):
                      failures.append("manifest binary file name missing")
                      continue
                  url = f"{release_base}/{name}"
                  if not isinstance(sha256, str):
                      failures.append(f"manifest binary file {url} sha256 missing")
                      continue
                  if not isinstance(size, int):
                      failures.append(f"manifest binary file {url} size missing")
                      continue
                  refs.append({"name": name, "url": url, "sha256": sha256, "size": size})
              return refs

          def check_host_binary_files(binary_files, expected_binary_files, label):
              if not isinstance(binary_files, list):
                  failures.append(f"{label} host binary files missing or not a list")
                  return

              files_by_url = {}
              for item in binary_files:
                  if not isinstance(item, dict):
                      failures.append(f"{label} host binary file entry is not an object")
                      continue
                  url = item.get("url")
                  if not isinstance(url, str):
                      failures.append(f"{label} host binary file entry missing url")
                      continue
                  files_by_url[url] = item

              expected_urls = {item["url"] for item in expected_binary_files}
              for expected in expected_binary_files:
                  url = expected["url"]
                  public_file = files_by_url.get(url)
                  if public_file is None:
                      failures.append(f"{label} missing host binary file {url}")
                      continue
                  for field in ("name", "sha256", "size"):
                      if public_file.get(field) != expected[field]:
                          failures.append(f"{label} host binary {field} mismatch for {url}")

              for url in sorted(set(files_by_url) - expected_urls):
                  failures.append(f"{label} unexpected host binary file {url}")

          def check_profile_catalog_artifact(
              source,
              expected_hash,
              expected_revision,
              expected_current_binary,
              expected_current_assets,
              expected_compatibility,
              expected_requires_newer,
          ):
              if not isinstance(source, str):
                  failures.append("profile catalog source missing or not a string")
                  return
              if not source.startswith("/profiles/releases/") or not source.endswith("/catalog.json"):
                  failures.append("profile catalog source must be a release-channel artifact path")
                  return
              if not isinstance(expected_hash, str):
                  failures.append(f"profile catalog {source} hash missing or not a string")
                  return
              if not isinstance(expected_revision, str):
                  failures.append(f"profile catalog {source} revision missing or not a string")
                  return

              try:
                  data = fetch_bytes(resolve_release_url(source))
              except Exception as error:
                  failures.append(f"profile catalog {source} fetch failed: {error}")
                  return

              actual_hash = blake3.blake3(data).hexdigest()
              if actual_hash != expected_hash:
                  failures.append(f"profile catalog {source} blake3 mismatch")
              try:
                  text = data.decode("utf-8")
              except UnicodeDecodeError:
                  failures.append(f"profile catalog {source} is not UTF-8")
                  return
              if "file://" in text:
                  failures.append(f"profile catalog {source} must not contain file:// URLs")
              try:
                  document = json.loads(text)
              except json.JSONDecodeError as error:
                  failures.append(f"profile catalog {source} JSON parse failed: {error}")
                  return
              if not isinstance(document, dict):
                  failures.append(f"profile catalog {source} document is not an object")
                  return
              if document.get("schema") != "capsem.profile_catalog.v1":
                  failures.append(f"profile catalog {source} schema mismatch")
              if document.get("revision") != expected_revision:
                  failures.append(f"profile catalog {source} revision mismatch")
              if document.get("state") != "current":
                  failures.append(f"profile catalog {source} state mismatch")
              if document.get("current_binary") != expected_current_binary:
                  failures.append(f"profile catalog {source} current_binary mismatch")
              if document.get("current_assets") != expected_current_assets:
                  failures.append(f"profile catalog {source} current_assets mismatch")
              actual_compatibility = document.get("compatibility")
              catalog_expected_compatibility = {
                  **expected_compatibility,
                  "requires_newer_binary": expected_requires_newer["binary"],
                  "requires_newer_assets": expected_requires_newer["assets"],
              }
              for field, expected in catalog_expected_compatibility.items():
                  actual = actual_compatibility.get(field) if isinstance(actual_compatibility, dict) else None
                  if actual != expected:
                      failures.append(f"profile catalog {source} compatibility {field} mismatch")

          expected_manifest = f"/assets/{channel}/manifest.json"
          failures = []
          current = health.get("current", {})
          current_binary = current.get("binary")
          current_assets = current.get("assets")
          if health.get("schema") != "capsem.assets_channel.health.v1":
              failures.append("health schema mismatch")
          if health.get("ok") is not True:
              failures.append("health ok mismatch")
          if health.get("channel") != channel:
              failures.append("health channel mismatch")
          if health.get("state") != "published":
              failures.append("health state mismatch")
          if health.get("urls", {}).get("index") != "/index.html":
              failures.append("health index URL mismatch")
          if health.get("urls", {}).get("health") != "/health.json":
              failures.append("health health URL mismatch")
          if health.get("urls", {}).get("manifest") != expected_manifest:
              failures.append("health manifest URL mismatch")
          if health.get("urls", {}).get("asset_base") != "/assets/releases":
              failures.append("health asset base mismatch")
          if health.get("urls", {}).get("profile_catalog") != health.get("profiles", {}).get("source"):
              failures.append("health profile catalog URL mismatch")
          if health.get("binary", {}).get("version") != current_binary:
              failures.append("health binary version mismatch")
          if health.get("assets", {}).get("version") != current_assets:
              failures.append("health asset version mismatch")
          current_manifest_asset_release = manifest.get("assets", {}).get("releases", {}).get(current_assets)
          current_manifest_binary_release = manifest.get("binaries", {}).get("releases", {}).get(current_binary)
          expected_asset_compatibility = {
              "binary": current_binary,
              "min_binary": current_manifest_asset_release.get("min_binary") if isinstance(current_manifest_asset_release, dict) else None,
          }
          actual_asset_compatibility = health.get("assets", {}).get("compatibility")
          for field, expected in expected_asset_compatibility.items():
              actual = actual_asset_compatibility.get(field) if isinstance(actual_asset_compatibility, dict) else None
              if actual != expected:
                  failures.append(f"health asset compatibility {field} mismatch")
          actual_asset_requires_newer = health.get("assets", {}).get("requires_newer")
          actual_asset_requires_newer_binary = actual_asset_requires_newer.get("binary") if isinstance(actual_asset_requires_newer, dict) else None
          if actual_asset_requires_newer_binary is not False:
              failures.append("health asset requirement binary mismatch")
          if health.get("profiles", {}).get("state") != "current":
              failures.append("health profile state mismatch")
          expected_profile_compatibility = {
              "binary": current_binary,
              "assets": current_assets,
              "min_binary": current_manifest_asset_release.get("min_binary") if isinstance(current_manifest_asset_release, dict) else None,
              "min_assets": current_manifest_binary_release.get("min_assets") if isinstance(current_manifest_binary_release, dict) else None,
          }
          actual_profile_compatibility = health.get("profiles", {}).get("compatibility")
          for field, expected in expected_profile_compatibility.items():
              actual = actual_profile_compatibility.get(field) if isinstance(actual_profile_compatibility, dict) else None
              if actual != expected:
                  failures.append(f"health profile compatibility {field} mismatch")
          actual_profile_requires_newer = health.get("profiles", {}).get("requires_newer")
          for field, expected in (("binary", False), ("assets", False)):
              actual = actual_profile_requires_newer.get(field) if isinstance(actual_profile_requires_newer, dict) else None
              if actual != expected:
                  failures.append(f"health profile requirement {field} mismatch")
          updates = health.get("updates", {})
          if not isinstance(updates.get("binary"), dict):
              failures.append("health binary update metadata missing")
          else:
              if updates.get("binary", {}).get("latest") != current_binary:
                  failures.append("health binary update latest mismatch")
              if updates.get("binary", {}).get("current") != current_binary:
                  failures.append("health binary update current mismatch")
              if updates.get("binary", {}).get("state") != health.get("binary", {}).get("state"):
                  failures.append("health binary update state mismatch")
              if updates.get("binary", {}).get("source") != "manifest.binaries.current":
                  failures.append("health binary update source mismatch")
              if updates.get("binary", {}).get("files") != health.get("binary", {}).get("files"):
                  failures.append("health binary update files mismatch")
          if not isinstance(updates.get("assets"), dict):
              failures.append("health asset update metadata missing")
          else:
              if updates.get("assets", {}).get("latest") != current_assets:
                  failures.append("health asset update latest mismatch")
              if updates.get("assets", {}).get("current") != current_assets:
                  failures.append("health asset update current mismatch")
              if updates.get("assets", {}).get("state") != health.get("assets", {}).get("state"):
                  failures.append("health asset update state mismatch")
              if updates.get("assets", {}).get("source") != "manifest.assets.current":
                  failures.append("health asset update source mismatch")
              if updates.get("assets", {}).get("manifest") != expected_manifest:
                  failures.append("health asset update manifest mismatch")
              if updates.get("assets", {}).get("asset_base") != "/assets/releases":
                  failures.append("health asset update base mismatch")
              if updates.get("assets", {}).get("compatibility") != health.get("assets", {}).get("compatibility"):
                  failures.append("health asset update compatibility mismatch")
              if updates.get("assets", {}).get("requires_newer") != health.get("assets", {}).get("requires_newer"):
                  failures.append("health asset update requirement mismatch")
              if updates.get("assets", {}).get("compatibility") != expected_asset_compatibility:
                  failures.append("health asset update canonical compatibility mismatch")
              if updates.get("assets", {}).get("requires_newer") != {"binary": False}:
                  failures.append("health asset update canonical requirement mismatch")
          if updates.get("profiles", {}).get("source") != health.get("profiles", {}).get("source"):
              failures.append("health profile update source mismatch")
          if not isinstance(updates.get("profiles"), dict):
              failures.append("health profile update metadata missing")
          else:
              if updates.get("profiles", {}).get("hash") != health.get("profiles", {}).get("hash"):
                  failures.append("health profile update hash mismatch")
              if updates.get("profiles", {}).get("compatibility") != health.get("profiles", {}).get("compatibility"):
                  failures.append("health profile update compatibility mismatch")
              if updates.get("profiles", {}).get("requires_newer") != health.get("profiles", {}).get("requires_newer"):
                  failures.append("health profile update requirement mismatch")
          check_profile_catalog_artifact(
              health.get("profiles", {}).get("source"),
              health.get("profiles", {}).get("hash"),
              health.get("profiles", {}).get("revision"),
              current_binary,
              current_assets,
              expected_profile_compatibility,
              {"binary": False, "assets": False},
          )
          for key in ("binary", "assets"):
              if not isinstance(updates.get(key, {}).get("latest"), str):
                  failures.append(f"health updates.{key}.latest missing or not a string")
          for key in ("profiles", "images"):
              track = updates.get(key, {})
              if "latest" not in track:
                  failures.append(f"health updates.{key}.latest missing")
              if not isinstance(track.get("state"), str):
                  failures.append(f"health updates.{key}.state missing or not a string")
          if not isinstance(updates.get("images"), dict):
              failures.append("health image update metadata missing")
          else:
              if updates.get("images", {}).get("latest") is not None:
                  failures.append("health image update latest must be null while unpublished")
              if updates.get("images", {}).get("current") is not None:
                  failures.append("health image update current must be null while unpublished")
              if updates.get("images", {}).get("state") != "not_published":
                  failures.append("health image update state mismatch")
              if updates.get("images", {}).get("source") != "not_in_asset_channel":
                  failures.append("health image update source mismatch")
          evidence = health.get("evidence", {})
          for key in ("vm_oboms", "host_sboms", "host_binary_files", "attestations"):
              if not isinstance(evidence.get(key), list):
                  failures.append(f"health evidence.{key} missing or not a list")
          asset_files = health.get("assets", {}).get("files", [])
          vm_oboms = evidence.get("vm_oboms", [])
          host_sboms = evidence.get("host_sboms", [])
          host_binary_files = evidence.get("host_binary_files", [])
          attestations = evidence.get("attestations", [])
          host_binary_by_url = {
              item.get("url"): item
              for item in host_binary_files
              if isinstance(item, dict) and isinstance(item.get("url"), str)
          }
          host_package_subjects = {
              url
              for url, item in host_binary_by_url.items()
              if item.get("name") != "capsem-sbom.spdx.json"
          }
          asset_by_url = {
              item.get("url"): item
              for item in asset_files
              if isinstance(item, dict) and isinstance(item.get("url"), str)
          }
          host_sbom_urls = {
              item.get("url")
              for item in host_sboms
              if isinstance(item, dict) and isinstance(item.get("url"), str)
          }
          vm_obom_urls = {
              item.get("url")
              for item in vm_oboms
              if isinstance(item, dict) and isinstance(item.get("url"), str)
          }
          if host_binary_files and not host_sboms:
              failures.append("health evidence host_sboms missing for published binary files")
          if asset_files and not vm_oboms:
              failures.append("health evidence vm_oboms missing for published VM assets")
          if (host_binary_files or asset_files) and not attestations:
              failures.append("health evidence attestations missing for published artifacts")
          for sbom in host_sboms:
              if not isinstance(sbom, dict):
                  failures.append("health evidence host_sboms entry is not an object")
                  continue
              url = sbom.get("url")
              if sbom.get("name") != "capsem-sbom.spdx.json":
                  failures.append(f"host SBOM evidence {url} name mismatch")
              host_binary = host_binary_by_url.get(url)
              if host_binary is None:
                  failures.append(f"host SBOM evidence {url} missing from host binary files")
                  continue
              if host_binary.get("name") != "capsem-sbom.spdx.json":
                  failures.append(f"host SBOM evidence {url} binary file name mismatch")
              check_evidence_artifact(sbom, "sha256", "sha256", "host SBOM evidence", "spdx")
          for obom in vm_oboms:
              if not isinstance(obom, dict):
                  failures.append("health evidence vm_oboms entry is not an object")
                  continue
              url = obom.get("url")
              if url not in asset_by_url:
                  failures.append(f"VM OBOM evidence {url} missing from asset files")
                  continue
              check_evidence_artifact(obom, "hash", "blake3", "VM OBOM evidence", "cyclonedx")
          saw_host_sbom_attestation = False
          host_sbom_attestation_subjects = set()
          for attestation in attestations:
              if not isinstance(attestation, dict):
                  failures.append("health evidence attestations entry is not an object")
                  continue
              attestation_name = attestation.get("name")
              expected_rail = attestation_expected_rails().get(attestation_name)
              if expected_rail is not None:
                  scope = attestation.get("scope")
                  if scope != expected_rail["scope"]:
                      failures.append(f"health evidence {attestation_name} scope mismatch")
                  workflow = attestation.get("workflow")
                  if workflow != expected_rail["workflow"]:
                      failures.append(f"health evidence {attestation_name} workflow mismatch")
              if attestation_name == "github_attestations_host_sbom":
                  saw_host_sbom_attestation = True
              predicate_type = attestation.get("predicate_type")
              if not isinstance(predicate_type, str) or not predicate_type:
                  failures.append("health evidence attestation predicate_type missing")
              verify_command = attestation.get("verify_command")
              if (
                  not isinstance(verify_command, str)
                  or "gh attestation verify" not in verify_command
              ):
                  failures.append(
                      "health evidence attestation verify_command must use gh attestation verify"
                  )
              predicate_url = attestation.get("predicate_url")
              subjects = attestation.get("subjects")
              if not isinstance(subjects, list) or not subjects:
                  failures.append("health evidence attestation subjects missing")
                  continue
              if attestation_name == "github_attestations_host_sbom" and not isinstance(
                  predicate_url, str
              ):
                  failures.append(
                      "health evidence host SBOM attestation predicate_url missing"
                  )
              if attestation_name == "github_attestations_vm_assets" and not isinstance(
                  predicate_url, str
              ):
                  failures.append(
                      "health evidence VM asset attestation predicate_url missing"
                  )
              predicate_urls, predicate_label = attestation_predicate_evidence_urls(
                  attestation,
                  subjects,
                  host_binary_by_url,
                  asset_by_url,
                  host_sbom_urls,
                  vm_obom_urls,
              )
              if predicate_url is not None and predicate_url not in predicate_urls:
                  failures.append(
                      f"attestation predicate_url {predicate_url} missing from {predicate_label}"
                  )
              for subject in subjects:
                  if not isinstance(subject, str):
                      failures.append("health evidence attestation subject is not a string")
                      continue
                  if attestation_name == "github_attestations_host_sbom":
                      host_sbom_attestation_subjects.add(subject)
                  if subject not in host_binary_by_url and subject not in asset_by_url:
                      failures.append(
                          f"attestation subject {subject} missing from published file lists"
                      )
          if host_sboms and not saw_host_sbom_attestation:
              failures.append("health evidence host SBOM attestation missing")
          for subject in sorted(host_package_subjects - host_sbom_attestation_subjects):
              failures.append(f"health evidence host SBOM attestation subjects missing {subject}")
          if manifest.get("format") != 2:
              failures.append("manifest format mismatch")
          if manifest.get("assets", {}).get("current") != current_assets:
              failures.append("health current assets mismatch manifest")
          if manifest.get("binaries", {}).get("current") != current_binary:
              failures.append("health current binary mismatch manifest")
          expected_asset_files = current_asset_file_refs(current_assets, current_manifest_asset_release)
          check_health_asset_files(health.get("assets", {}).get("files"), expected_asset_files)
          expected_binary_files = current_binary_file_refs(current_binary, current_manifest_binary_release)
          check_host_binary_files(health.get("binary", {}).get("files"), expected_binary_files, "health")
          check_host_binary_files(
              health.get("evidence", {}).get("host_binary_files"),
              expected_binary_files,
              "evidence",
          )
          manifest_asset_releases = manifest.get("assets", {}).get("releases", {})
          health_asset_releases = health.get("asset_releases", [])
          if not isinstance(health_asset_releases, list):
              failures.append("health asset releases missing or not a list")
              health_asset_releases = []
          asset_release_by_version = {
              release.get("version"): release
              for release in health_asset_releases
              if isinstance(release, dict) and isinstance(release.get("version"), str)
          }
          for version, manifest_release in manifest_asset_releases.items():
              if not isinstance(version, str) or not isinstance(manifest_release, dict):
                  failures.append("manifest asset release entry malformed")
                  continue
              public_release = asset_release_by_version.get(version)
              if not isinstance(public_release, dict):
                  failures.append(f"health missing asset release {version}")
                  continue
              expected_deprecated = manifest_release.get("deprecated", False)
              expected_state = "deprecated" if expected_deprecated is True else "current"
              expected_fields = (
                  ("date", manifest_release.get("date")),
                  ("state", expected_state),
                  ("deprecated", expected_deprecated),
                  ("deprecated_date", manifest_release.get("deprecated_date")),
                  ("min_binary", manifest_release.get("min_binary")),
              )
              for field, expected in expected_fields:
                  if public_release.get(field) != expected:
                      failures.append(f"health asset release {version} {field} mismatch")
          for label, value in (
              ("current binary", current_binary),
              ("current assets", current_assets),
              ("generated timestamp", health.get("generated_at")),
              ("profile revision", health.get("profiles", {}).get("revision")),
              ("profile catalog", health.get("profiles", {}).get("source")),
              ("channel manifest", expected_manifest),
          ):
              if not isinstance(value, str):
                  failures.append(f"health {label} missing or not a string")
              elif value not in index:
                  failures.append(f"index page missing {label} {value}")
          current_asset_release = asset_release_by_version.get(current_assets, {})
          current_asset_date = current_asset_release.get("date")
          if not isinstance(current_asset_date, str):
              failures.append("health current asset release date missing")
          elif current_asset_date not in index:
              failures.append("index page missing current asset release date")
          check_cache_header("release index", f"{release_site_url}/", ("no-cache", "must-revalidate"))
          check_cache_header("health JSON", f"{release_site_url}/health.json", ("no-cache", "must-revalidate"))
          check_cache_header(
              "channel manifest",
              f"{release_site_url}/assets/{channel}/manifest.json",
              ("no-cache", "must-revalidate"),
          )
          for item in asset_files:
              if not isinstance(item, dict):
                  continue
              url = item.get("url")
              if isinstance(url, str) and release_url_path(url).startswith("/assets/releases/"):
                  check_cache_header(
                      "immutable asset",
                      resolve_release_url(url),
                      ("public", "max-age=31536000", "immutable"),
                  )
          profile_source = updates.get("profiles", {}).get("source")
          if (
              isinstance(profile_source, str)
              and release_url_path(profile_source).startswith("/profiles/releases/")
          ):
              check_cache_header(
                  "immutable profile catalog",
                  resolve_release_url(profile_source),
                  ("public", "max-age=31536000", "immutable"),
              )
          if "Current Asset Files" not in index or "/health.json" not in index:
              failures.append("index page missing release status content")
          if failures:
              print("; ".join(failures), file=sys.stderr)
              sys.exit(1)
          PY
            then
              echo "release.capsem.org smoke passed."
              exit 0
            fi
            sleep 10
          done

          echo "release.capsem.org smoke failed after deploy." >&2
          exit 1
