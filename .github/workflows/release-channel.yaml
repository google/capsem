name: Publish Asset Channel

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
      dist_artifact:
        type: string
        required: true
      deploy_branch:
        type: string
        required: false
        default: main
      release_site_url:
        type: string
        required: false
        default: https://release.capsem.org
      validate_complete_public_channels:
        description: Require both stable and nightly after a production deploy.
        type: boolean
        required: false
        default: true
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Publish asset channel
    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CHANNEL: ${{ inputs.channel }}
      DIST_DIR: target/release-channel

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Download generated asset channel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.dist_artifact }}
          path: target/release-channel/

      - name: Require generated asset channel
        run: |
          test -f "$DIST_DIR/index.html"
          test -f "$DIST_DIR/health.json"
          test -f "$DIST_DIR/_headers"
          test -f "$DIST_DIR/assets/$CHANNEL/manifest.json"
          oversized="$(find "$DIST_DIR" -type f -size +25M -print -quit)"
          if [ -n "$oversized" ]; then
            echo "::error::release.capsem.org Pages dist contains oversized file: $oversized"
            exit 1
          fi

      - name: Check asset channel
        run: |
          cargo run -p capsem-admin -- assets channel check \
            --channel "$CHANNEL" \
            --dist "$DIST_DIR"
          python - "$DIST_DIR/health.json" <<'PY'
          import json
          import sys

          health = json.load(open(sys.argv[1], encoding="utf-8"))
          evidence = health.get("evidence", {})
          for key in ("vm_oboms", "host_sboms", "host_binary_files", "attestations"):
              if key not in evidence:
                  raise SystemExit(f"missing release evidence key: {key}")
          PY

      - name: Require Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is required to deploy release.capsem.org"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required to deploy release.capsem.org"
            exit 1
          fi

      - name: Verify Cloudflare Pages project
        env:
          RELEASE_CHANNEL_PROJECT: release
        run: |
          python scripts/check-cloudflare-pages-project.py \
            --project "$RELEASE_CHANNEL_PROJECT"

      - name: Deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy target/release-channel/ --project-name=release --branch=${{ inputs.deploy_branch || 'main' }}

      - name: Validate deployed asset channel content
        env:
          RELEASE_SITE_URL: ${{ inputs.release_site_url || 'https://release.capsem.org' }}
          VALIDATE_COMPLETE_PUBLIC_CHANNELS: ${{ inputs.validate_complete_public_channels }}
        run: |
          CHANNEL_ARGS=(--channel "$CHANNEL")
          if [ "$VALIDATE_COMPLETE_PUBLIC_CHANNELS" = "true" ]; then
            CHANNEL_ARGS=(--channel stable --channel nightly)
          fi
          uv run python scripts/check-release-site-contract.py \
            --base-url "$RELEASE_SITE_URL" \
            "${CHANNEL_ARGS[@]}" \
            --attempts 30 \
            --delay-seconds 20
