name: Stage Asset Channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Staging asset channel name.
        required: true
        default: staging
      deploy_branch:
        description: Cloudflare Pages preview branch to publish.
        required: true
        default: staging
      release_site_url:
        description: Cloudflare Pages preview URL for the deploy branch.
        required: true
        default: https://staging.release-eq7.pages.dev
      manifest_version:
        description: Staged manifest contract version.
        required: true
        default: 1.0.2

permissions:
  contents: read
  deployments: write

jobs:
  assemble-staging-channel:
    runs-on: ubuntu-latest
    name: Assemble staging asset channel
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: release-site/pnpm-lock.yaml
      - name: Install release site dependencies
        run: cd release-site && pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: release-channel-staging

      - name: Write staging release channel fixture
        run: |
          python3 scripts/write-release-site-ci-fixture.py \
            --without-binary-files \
            target/release-channel-staging-fixture

      - name: Generate staging release channel data
        run: |
          cargo run -p capsem-admin -- assets channel build \
            --manifest "file://$PWD/target/release-channel-staging-fixture/assets/manifest.json" \
            --assets-dir target/release-channel-staging-fixture/assets \
            --channel "${{ inputs.channel }}" \
            --manifest-version "${{ inputs.manifest_version }}" \
            --out-dir target/release-channel

      - name: Build release site pages
        env:
          CAPSEM_RELEASE_CHANNEL_DIST: ${{ github.workspace }}/target/release-channel
        run: bash scripts/check-web-surface.sh release-site-build

      - name: Check staging release channel
        run: |
          cargo run -p capsem-admin -- assets channel check \
            --channel "${{ inputs.channel }}" \
            --dist target/release-channel

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: asset-channel-staging-preview
          path: target/release-channel/

  deploy-staging-channel:
    needs: assemble-staging-channel
    uses: ./.github/workflows/release-channel.yaml
    with:
      channel: ${{ inputs.channel }}
      dist_artifact: asset-channel-staging-preview
      deploy_branch: ${{ inputs.deploy_branch }}
      release_site_url: ${{ inputs.release_site_url }}
      validate_complete_public_channels: false
    secrets: inherit
