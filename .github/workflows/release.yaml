name: Release
run-name: Release ${{ inputs.channel }} ${{ inputs.tag }}
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable v* tag to release
        required: true
        type: string
      channel:
        description: Binary channel to advance
        required: true
        type: choice
        options:
          - stable
          - nightly

concurrency:
  group: binary-release-channel
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  deployments: write
  id-token: write

env:
  RELEASE_TAG: ${{ inputs.tag }}
  RELEASE_CHANNEL: ${{ inputs.channel }}
  ASSET_MANIFEST_URL: https://release.capsem.org/assets/${{ inputs.channel }}/manifest.json

jobs:
  preflight:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Verify immutable dispatch tag and channel
        run: |
          set -euo pipefail
          test "$GITHUB_REF_TYPE" = tag
          test "$GITHUB_REF_NAME" = "$RELEASE_TAG"
          case "$RELEASE_TAG" in v*) ;; *) exit 1 ;; esac
          case "$RELEASE_CHANNEL" in stable|nightly) ;; *) exit 1 ;; esac
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Import Apple certificate (preflight)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          KEYCHAIN="preflight-$$.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID" || true)
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID signing identity found. Check APPLE_CERTIFICATE secret."
            echo "::error::If the p12 was created with OpenSSL 3.x, it uses PBES2/AES encryption."
            echo "::error::macOS requires legacy 3DES. Re-export with: scripts/fix_p12_legacy.sh"
            exit 1
          fi
          echo "codesigning identities:"
          echo "$IDENTITY"
          # Installer cert is not a codesigning identity; check with full list.
          INSTALLER=$(security find-identity -v "$KEYCHAIN" | grep "Developer ID Installer" || true)
          if [ -z "$INSTALLER" ]; then
            echo "::error::No Developer ID Installer identity found. productsign (.pkg signing) will fail."
            echo "::error::Export a combined p12 containing both Application and Installer certs."
            exit 1
          fi
          echo "installer identity: $INSTALLER"
          security delete-keychain "$KEYCHAIN"
          rm cert.p12

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "Tauri signing key is set"

      - name: Verify notarization credentials
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          if [ -z "$APPLE_API_ISSUER" ] || [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_KEY_CONTENT" ]; then
            echo "::error::Notarization secrets missing (APPLE_API_ISSUER, APPLE_API_KEY, or APPLE_API_KEY_PATH)"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          xcrun notarytool history \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            >/dev/null 2>&1 \
            && echo "Notarization credentials verified (notarytool history succeeded)" \
            || { echo "::error::notarytool history failed -- check APPLE_API_ISSUER, APPLE_API_KEY, and APPLE_API_KEY_PATH secrets"; exit 1; }
          rm -rf "$RUNNER_TEMP/private_keys"
  test:
    # TEMPORARILY DISABLED: macOS full gate. GitHub-hosted macOS runners cannot
    # provide nested Virtualization.framework access for Capsem/Colima, and the
    # repository has no physical macOS runner. Restore a parallel macOS `just
    # test` job when that runner exists. Until then, this Linux full gate remains
    # release-blocking; both macOS and Linux package jobs fan out only after it.
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - uses: extractions/setup-just@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: full-release-gate-linux

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5

      - name: Install Linux full-gate system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            musl-tools \
            pkg-config \
            xdg-utils \
            xvfb

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -r /dev/kvm -a -w /dev/kvm
          sudo modprobe vhost_vsock
          sudo chmod 0666 /dev/vhost-vsock
          test -r /dev/vhost-vsock -a -w /dev/vhost-vsock

      - name: Complete canonical release gate (just test)
        run: just test

      - name: Upload full-gate artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: full-release-gate-linux-${{ github.run_attempt }}
          path: |
            test-artifacts/
            frontend/test-artifacts/
            target/build.log
          retention-days: 14
          if-no-files-found: ignore

  build-app-macos:
    needs: [preflight, test]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-app-macos

      - name: Materialize runtime config
        run: |
          cargo run -p capsem-admin -- profile materialize \
            --profile config/profiles/code/profile.toml \
            --config-root config \
            --manifest "$ASSET_MANIFEST_URL" \
            --assets-dir assets \
            --output-root target/config \
            --arch arm64 \
            --clean

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Install cargo tools
        env:
          CARGO_NET_RETRY: 10
        run: |
          install_cargo_tool() {
            tool="$1"
            for attempt in 1 2 3; do
              if cargo install "$tool" --locked; then
                return 0
              fi
              echo "cargo install $tool failed on attempt $attempt/3"
              sleep $((attempt * 15))
            done
            return 1
          }

          install_cargo_tool tauri-cli
          install_cargo_tool cargo-auditable
          for attempt in 1 2 3; do
            if cargo install cargo-sbom --locked; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            echo "cargo install cargo-sbom failed on attempt $attempt/3"
            sleep $((attempt * 15))
          done

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')

      - name: Write Apple API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"

      - name: Validate build context completeness
        run: |
          uv run python3 -c "
          from capsem.builder.doctor import check_source_files
          from pathlib import Path
          result = check_source_files(Path('.'))
          if not result.passed:
              raise SystemExit(f'Source file check failed: {result.detail}')
          print(f'OK: {result.detail}')
          "

      - name: Build and sign app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          cd crates/capsem-app
          cargo tauri build --bundles app --skip-stapling

      - name: Build companion binaries
        run: |
          cargo build --release \
            -p capsem \
            -p capsem-service \
            -p capsem-process \
            -p capsem-tui \
            -p capsem-mcp \
            -p capsem-mcp-aggregator \
            -p capsem-mcp-builtin \
            -p capsem-gateway \
            -p capsem-tray \
            -p capsem-admin

      - name: Codesign companion binaries
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bin in capsem capsem-service capsem-process capsem-tui capsem-mcp capsem-mcp-aggregator capsem-mcp-builtin capsem-gateway capsem-tray capsem-admin; do
            codesign --sign "$APPLE_SIGNING_IDENTITY" \
              --options runtime \
              --timestamp \
              --entitlements entitlements.plist \
              --force \
              "target/release/$bin"
          done

      - name: Build .pkg installer
        run: |
          VERSION="${RELEASE_TAG#v}"
          bash scripts/build-pkg.sh \
            --manifest "$ASSET_MANIFEST_URL" \
            "target/release/bundle/macos/Capsem.app" \
            "target/release" \
            "assets" \
            "target/config" \
            "$VERSION" \
            "${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}"

      - name: Notarize and staple .pkg
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          VERSION="${RELEASE_TAG#v}"
          xcrun notarytool submit "packages/Capsem-$VERSION.pkg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 30m
          xcrun stapler staple "packages/Capsem-$VERSION.pkg"
          xcrun stapler validate "packages/Capsem-$VERSION.pkg"

      - name: Install exact notarized package
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          sudo /usr/sbin/installer -pkg "packages/Capsem-$VERSION.pkg" -target /
          test -d "/Applications/Capsem.app"
          test -x "/Applications/Capsem.app/Contents/MacOS/capsem-app"
          test -x "$HOME/.capsem/bin/capsem"
          "$HOME/.capsem/bin/capsem" --version | grep -F "$VERSION"
          for bin in capsem capsem-admin capsem-gateway capsem-mcp capsem-mcp-aggregator capsem-mcp-builtin capsem-process capsem-service capsem-tray capsem-tui; do
            test -x "$HOME/.capsem/bin/$bin"
            "$HOME/.capsem/bin/$bin" --version | grep -F "$VERSION"
          done
          "$HOME/.capsem/bin/capsem" status | tee /tmp/capsem-status.txt
          grep -F "Installed: true" /tmp/capsem-status.txt
          grep -F "Running:   true" /tmp/capsem-status.txt
          grep -F "Service:   ok" /tmp/capsem-status.txt
          grep -F "Gateway:   ok" /tmp/capsem-status.txt
          pgrep -x capsem-tray

      - name: Collect macOS artifacts
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p release-artifacts
          if [ ! -f "packages/Capsem-$VERSION.pkg" ]; then
            echo "::error::Capsem-$VERSION.pkg not produced by build-pkg.sh"
            exit 1
          fi
          cp "packages/Capsem-$VERSION.pkg" release-artifacts/
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: release-artifacts/

  build-app-linux:
    needs: [preflight, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
            bundles: deb
          - arch: x86_64
            runner: ubuntu-24.04
            bundles: deb
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-app-linux-${{ matrix.arch }}

      - name: Materialize runtime config
        run: |
          cargo run -p capsem-admin -- profile materialize \
            --profile config/profiles/code/profile.toml \
            --config-root config \
            --manifest "$ASSET_MANIFEST_URL" \
            --assets-dir assets \
            --output-root target/config \
            --arch ${{ matrix.arch }} \
            --clean

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            xdg-utils \
            xvfb

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Install cargo tools
        env:
          CARGO_NET_RETRY: 10
        run: |
          install_cargo_tool() {
            tool="$1"
            for attempt in 1 2 3; do
              if cargo install "$tool" --locked; then
                return 0
              fi
              echo "cargo install $tool failed on attempt $attempt/3"
              sleep $((attempt * 15))
            done
            return 1
          }

          install_cargo_tool tauri-cli
          install_cargo_tool cargo-auditable

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd crates/capsem-app
          cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Build companion binaries
        run: |
          cargo build --release -p capsem -p capsem-service -p capsem-process -p capsem-tui -p capsem-mcp -p capsem-mcp-aggregator -p capsem-mcp-builtin -p capsem-gateway -p capsem-tray -p capsem-admin

      - name: Repack .deb with companion binaries
        run: |
          DEB_FILE=$(ls target/release/bundle/deb/*.deb)
          bash scripts/repack-deb.sh --manifest "$ASSET_MANIFEST_URL" "$DEB_FILE" "target/release" "target/config" "assets"

      - name: Validate artifacts
        run: |
          echo "=== Validate deb ==="
          dpkg-deb --info target/release/bundle/deb/*.deb
          echo "=== Verify companion binaries in deb ==="
          dpkg-deb --contents target/release/bundle/deb/*.deb | grep -E "capsem-service|capsem-tui|capsem-mcp-aggregator|capsem-mcp-builtin|capsem-gateway|capsem-tray|capsem-admin"

      - name: Enable KVM for exact-package VM proof
        if: matrix.arch == 'x86_64'
        run: |
          sudo modprobe kvm
          sudo chmod 0666 /dev/kvm
          sudo modprobe vhost_vsock
          sudo chmod 0666 /dev/vhost-vsock
          test -r /dev/kvm -a -w /dev/kvm
          test -r /dev/vhost-vsock -a -w /dev/vhost-vsock

      - name: Install exact release deb
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          sudo dpkg -i target/release/bundle/deb/*.deb || sudo apt-get install -f -y
          test -x /usr/bin/capsem
          /usr/bin/capsem --version | grep -F "$VERSION"
          dpkg-query -W -f='${Version}' capsem | grep -Fx "$VERSION"
          for bin in capsem capsem-admin capsem-app capsem-gateway capsem-mcp capsem-mcp-aggregator capsem-mcp-builtin capsem-process capsem-service capsem-tray capsem-tui; do
            test -x "/usr/bin/$bin"
            if [ "$bin" != "capsem-app" ]; then
              "/usr/bin/$bin" --version | grep -F "$VERSION"
            fi
          done
          /usr/bin/capsem status | tee /tmp/capsem-status.txt
          grep -F "Installed: true" /tmp/capsem-status.txt
          grep -F "Running:   true" /tmp/capsem-status.txt
          grep -F "Service:   ok" /tmp/capsem-status.txt
          grep -F "Gateway:   ok" /tmp/capsem-status.txt

      - name: Prove exact-package guest shell execution
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          python3 scripts/prove-installed-shell.py \
            --capsem /usr/bin/capsem \
            --marker CAPSEM_EXACT_PACKAGE_SHELL_OK \
            --session-name release-exact-shell-x86_64 \
            --timeout 300

      - name: Collect Linux artifacts
        run: |
          mkdir -p release-artifacts
          cp target/release/bundle/deb/*.deb release-artifacts/
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-${{ matrix.arch }}
          path: release-artifacts/

  create-release:
    needs: [test, build-app-macos, build-app-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Download the exact platform artifacts that passed their install gates.
      - uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-arm64
          path: release-artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-x86_64
          path: release-artifacts/

      - name: Install host SBOM archive deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zstd

      - name: Generate packaged host SBOM
        run: |
          set -euo pipefail
          ARTIFACTS=()
          for file in release-artifacts/*.pkg release-artifacts/*.deb; do
            [ -f "$file" ] && ARTIFACTS+=("$file")
          done
          if [ "${#ARTIFACTS[@]}" -eq 0 ]; then
            echo "::error::no package artifacts available for host SBOM"
            exit 1
          fi
          python3 scripts/generate-host-binary-sbom.py \
            --output release-artifacts/capsem-sbom.spdx.json \
            "${ARTIFACTS[@]}"

      - name: Attest build provenance (pkg + deb)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release-artifacts/*.pkg
            release-artifacts/*.deb

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            release-artifacts/*.pkg
            release-artifacts/*.deb
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: release-artifacts/capsem-sbom.spdx.json

      - name: Build summary
        run: |
          VERSION="${RELEASE_TAG#v}"
          PKG=$(ls -1 release-artifacts/*.pkg 2>/dev/null | head -1)
          PKG_NAME=$(basename "$PKG" 2>/dev/null || echo "N/A")
          PKG_SIZE=$(du -h "$PKG" 2>/dev/null | cut -f1 || echo "N/A")
          SBOM_PKGS=$(python3 -c "import json; d=json.load(open('release-artifacts/capsem-sbom.spdx.json')); print(len(d.get('packages',[])))" 2>/dev/null || echo "?")

          # Build artifact table rows for all mandatory debs.
          LINUX_ROWS=""
          for f in release-artifacts/*.deb; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            SIZE=$(du -h "$f" | cut -f1)
            LINUX_ROWS="${LINUX_ROWS}| ${NAME} | ${SIZE} |
          "
          done
          [ -n "$LINUX_ROWS" ]

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Release $VERSION

          ### Artifacts

          | File | Size |
          |------|------|
          | $PKG_NAME | $PKG_SIZE |
          ${LINUX_ROWS}| Asset manifest | $ASSET_MANIFEST_URL |
          | capsem-sbom.spdx.json | $SBOM_PKGS packages |

          ### Security

          - Apple codesigned (Developer ID), notarized + stapled (.pkg)
          - SLSA build provenance attested (pkg + deb)
          - SBOM attested (SPDX 2.3, pkg + deb)
          - VM assets are served by the manual asset workflow through release.capsem.org
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          NOTES="${NOTES}

          ### VM Assets

          VM assets are released independently at ${ASSET_MANIFEST_URL}.
          "

          gh release create "$RELEASE_TAG" \
            release-artifacts/*.pkg \
            release-artifacts/capsem-sbom.spdx.json \
            --title "Capsem $RELEASE_TAG" \
            --notes "$NOTES"

          for deb in release-artifacts/*.deb; do
            [ -f "$deb" ] && gh release upload "$RELEASE_TAG" "$deb"
          done

  assemble-release-channel:
    needs: [create-release]
    runs-on: ubuntu-latest
    outputs:
      dist_artifact: binary-channel-preview
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: release-site/pnpm-lock.yaml
      - name: Install release site dependencies
        run: cd release-site && pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-channel-binary

      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-arm64
          path: release-artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-x86_64
          path: release-artifacts/

      - name: Install host SBOM archive deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zstd

      - name: Generate packaged host SBOM
        run: |
          set -euo pipefail
          ARTIFACTS=()
          for file in release-artifacts/*.pkg release-artifacts/*.deb; do
            [ -f "$file" ] && ARTIFACTS+=("$file")
          done
          if [ "${#ARTIFACTS[@]}" -eq 0 ]; then
            echo "::error::no package artifacts available for host SBOM"
            exit 1
          fi
          python3 scripts/generate-host-binary-sbom.py \
            --output release-artifacts/capsem-sbom.spdx.json \
            "${ARTIFACTS[@]}"

      - name: Verify binary channel artifacts
        run: |
          set -euo pipefail
          if [ ! -f release-artifacts/capsem-sbom.spdx.json ]; then
            echo "::error::release-artifacts/capsem-sbom.spdx.json missing"
            exit 1
          fi
          package_found=false
          for file in release-artifacts/*.pkg release-artifacts/*.deb; do
            if [ -f "$file" ]; then
              package_found=true
              break
            fi
          done
          if [ "$package_found" != true ]; then
            echo "::error::no installable host package artifact found"
            exit 1
          fi

      - name: Fetch current asset channel manifests
        run: |
          set -euo pipefail
          mkdir -p target/binary-channel
          for channel in stable nightly; do
            mkdir -p "target/binary-channel/$channel"
            curl -fsSL "https://release.capsem.org/assets/$channel/manifest.json" \
              -o "target/binary-channel/$channel/manifest.json"
            cp "target/binary-channel/$channel/manifest.json" \
              "target/binary-channel/$channel/manifest.before.json"
          done

      - name: Record binary release metadata in selected channel manifest
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          ARTIFACT_ARGS=()
          for file in release-artifacts/*.pkg release-artifacts/*.deb release-artifacts/capsem-sbom.spdx.json; do
            [ -f "$file" ] && ARTIFACT_ARGS+=(--artifact "$file")
          done
          cargo run -p capsem-admin -- assets channel record-binary \
            --manifest-path "target/binary-channel/$RELEASE_CHANNEL/manifest.json" \
            --version "$VERSION" \
            "${ARTIFACT_ARGS[@]}"
          test -f "target/binary-channel/$RELEASE_CHANNEL/manifest.before.json"

      - name: Prove binary lane did not change VM assets
        run: |
          set -euo pipefail
          for channel in stable nightly; do
            python3 - "$channel" <<'PY'
          import json
          import sys
          from pathlib import Path

          channel = sys.argv[1]
          root = Path("target/binary-channel") / channel
          before = json.loads((root / "manifest.before.json").read_text())
          after = json.loads((root / "manifest.json").read_text())
          if "profiles" in before and "profiles" in after:
              if after["profiles"] != before["profiles"]:
                  raise SystemExit(f"{channel} binary release changed profile image metadata")
          else:
              if after["assets"] != before["assets"]:
                  raise SystemExit(f"{channel} binary release changed VM asset metadata")
          PY
          done

      - name: Verify binary release lane policy
        run: |
          uv run pytest \
            tests/capsem-release/test_binary_lane_gate.py \
            tests/capsem-release/test_release_lane_diff_policy.py -q

      - name: Build release channels with existing VM assets
        run: |
          set -euo pipefail
          rm -rf target/release-channel
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for channel in stable nightly; do
            cargo run -p capsem-admin -- assets channel build \
              --manifest "file://$PWD/target/binary-channel/$channel/manifest.json" \
              --asset-source-base "https://github.com/google/capsem/releases/download/assets-v{asset_version}" \
              --channel "$channel" \
              --manifest-version "1.0.${{ github.run_number }}" \
              --generated-at "$generated_at" \
              --out-dir target/release-channel
          done

      - name: Build release site pages
        env:
          CAPSEM_RELEASE_CHANNEL_DIST: ${{ github.workspace }}/target/release-channel
        run: cd release-site && pnpm run build:channel

      - name: Materialize preserved profile artifacts
        run: |
          uv run python3 scripts/materialize-graph-profile-artifacts.py \
            --dist target/release-channel

      - name: Check binary-updated release channels
        run: |
          set -euo pipefail
          for channel in stable nightly; do
            cargo run -p capsem-admin -- assets channel check \
              --channel "$channel" \
              --dist target/release-channel
          done

      - uses: actions/upload-artifact@v7
        with:
          name: binary-channel-preview
          path: target/release-channel/

  deploy-release-channel:
    needs: [assemble-release-channel]
    uses: ./.github/workflows/release-channel.yaml
    with:
      channel: ${{ inputs.channel }}
      dist_artifact: binary-channel-preview
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Post-release: verify the public asset channel remains reachable, then prove
  # the just-released .deb can hydrate VM assets from release.capsem.org.
  # ---------------------------------------------------------------------------
  verify-release-downloads:
    needs: [deploy-release-channel]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5

      - name: Wait for release assets to be queryable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "$RELEASE_TAG" --json assets --jq '.assets | length' >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Verify every URL in the asset channel manifest is reachable
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify
          curl -fsSL "$ASSET_MANIFEST_URL" -o /tmp/verify/manifest.json
          fail=0
          # Iterate every (arch, logical_name, hash) the current asset release declares.
          while IFS=$'\t' read -r asset_version arch name hash url; do
            code=$(curl -sIL -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              echo "::error::$url -> HTTP $code"
              fail=1
            else
              echo "ok  $url"
            fi
            blob="/tmp/verify/$asset_version-$arch-$name"
            if ! curl -fsSL "$url" -o "$blob"; then
              echo "::error::$url download failed"
              fail=1
              continue
            fi
            expected_hash="${hash#blake3:}"
            if ! uv run python3 - "$blob" "$expected_hash" <<'PY'
          import pathlib
          import sys

          import blake3

          path = pathlib.Path(sys.argv[1])
          expected = sys.argv[2]
          actual = blake3.blake3(path.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(1)
          PY
            then
              echo "::error::$url blake3 mismatch"
              fail=1
            fi
          done < <(python3 -c "
          import json
          import os
          from urllib.parse import urlparse

          m = json.load(open('/tmp/verify/manifest.json'))
          manifest = urlparse(os.environ['ASSET_MANIFEST_URL'])
          manifest_origin = f'{manifest.scheme}://{manifest.netloc}'
          asset_base = m.get('asset_base') or '/assets/releases'

          def asset_url(asset_version, arch, name):
              base = asset_base.rstrip('/')
              if '{asset_version}' in base:
                  version_base = base.replace('{asset_version}', asset_version)
              else:
                  version_base = f'{base}/{asset_version}'
              if version_base.startswith('/'):
                  version_base = f'{manifest_origin}{version_base}'
              return f'{version_base.rstrip(\"/\")}/{arch}-{name}'

          cur = m['assets']['current']
          for arch, files in m['assets']['releases'][cur]['arches'].items():
              for name, meta in files.items():
                  print(f'{cur}\t{arch}\t{name}\t{meta[\"hash\"]}\t{asset_url(cur, arch, name)}')
          ")
          [ "$fail" = 0 ] || { echo '::error::one or more asset URLs are unreachable or hash-mismatched'; exit 1; }

      - name: Verify public release packages and installer contract
        run: |
          set -euo pipefail
          uv run python3 scripts/check-public-binary-release.py \
            --channel "$RELEASE_CHANNEL" \
            --manifest-url "$ASSET_MANIFEST_URL" \
            --stable-manifest-url https://release.capsem.org/assets/stable/manifest.json \
            --nightly-manifest-url https://release.capsem.org/assets/nightly/manifest.json \
            --install-script-url https://capsem.org/install.sh \
            --site-url https://capsem.org/ \
            --work-dir /tmp/public-binary-release

      - name: Enable KVM for live public-install VM proof
        run: |
          set -euo pipefail
          sudo modprobe kvm
          sudo chmod 0666 /dev/kvm
          sudo modprobe vhost_vsock
          sudo chmod 0666 /dev/vhost-vsock
          test -r /dev/kvm -a -w /dev/kvm
          test -r /dev/vhost-vsock -a -w /dev/vhost-vsock

      - name: Install live public Linux release and prove guest shell execution
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python3 - <<'PY'
          import json

          manifest = json.load(open('/tmp/verify/manifest.json'))
          matches = [
              package
              for package in manifest.get('packages', [])
              if package.get('platform') == 'linux'
              and package.get('architecture') == 'x86_64'
          ]
          if len(matches) != 1 or not isinstance(matches[0].get('version'), str):
              raise SystemExit('manifest must contain exactly one versioned linux/x86_64 package')
          print(matches[0]['version'])
          PY
          )"
          curl -fsSL https://capsem.org/install.sh | CAPSEM_CHANNEL="$RELEASE_CHANNEL" sh
          test -x "$HOME/.capsem/bin/capsem"
          test -x /usr/bin/capsem-app
          "$HOME/.capsem/bin/capsem" --version | grep -F "$EXPECTED_VERSION"
          dpkg-query -W -f='${Version}' capsem | grep -Fx "$EXPECTED_VERSION"
          for bin in capsem capsem-admin capsem-gateway capsem-mcp capsem-mcp-aggregator capsem-mcp-builtin capsem-process capsem-service capsem-tray capsem-tui; do
            test -x "$HOME/.capsem/bin/$bin"
            "$HOME/.capsem/bin/$bin" --version | grep -F "$EXPECTED_VERSION"
          done
          grep -F "$ASSET_MANIFEST_URL" "$HOME/.capsem/assets/manifest-origin.json"
          "$HOME/.capsem/bin/capsem" status | tee /tmp/capsem-live-status.txt
          grep -F "Installed: true" /tmp/capsem-live-status.txt
          grep -F "Running:   true" /tmp/capsem-live-status.txt
          grep -F "Service:   ok" /tmp/capsem-live-status.txt
          grep -F "Gateway:   ok" /tmp/capsem-live-status.txt
          python3 scripts/prove-installed-shell.py \
            --capsem "$HOME/.capsem/bin/capsem" \
            --marker CAPSEM_LIVE_PUBLIC_INSTALL_SHELL_OK \
            --session-name release-live-public-shell-x86_64 \
            --timeout 300
