name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  preflight:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Import Apple certificate (preflight)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          KEYCHAIN="preflight-$$.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID" || true)
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID signing identity found. Check APPLE_CERTIFICATE secret."
            echo "::error::If the p12 was created with OpenSSL 3.x, it uses PBES2/AES encryption."
            echo "::error::macOS requires legacy 3DES. Re-export with: scripts/fix_p12_legacy.sh"
            exit 1
          fi
          echo "Signing identity: $IDENTITY"
          security delete-keychain "$KEYCHAIN"
          rm cert.p12

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "Tauri signing key is set"

      - name: Verify notarization credentials
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          if [ -z "$APPLE_API_ISSUER" ] || [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_KEY_CONTENT" ]; then
            echo "::error::Notarization secrets missing (APPLE_API_ISSUER, APPLE_API_KEY, or APPLE_API_KEY_PATH)"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          xcrun notarytool history \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            >/dev/null 2>&1 \
            && echo "Notarization credentials verified (notarytool history succeeded)" \
            || { echo "::error::notarytool history failed -- check APPLE_API_ISSUER, APPLE_API_KEY, and APPLE_API_KEY_PATH secrets"; exit 1; }
          rm -rf "$RUNNER_TEMP/private_keys"

  build-assets:
    needs: preflight
    runs-on: ubuntu-24.04-arm  # Native arm64 -- no QEMU, ~5x faster Docker builds
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          key: build-assets

      - name: Install b3sum
        run: cargo install b3sum --locked

      - name: Build VM assets
        run: python3 images/build.py

      - uses: actions/upload-artifact@v4
        with:
          name: vm-assets
          path: assets/

  test:
    needs: build-assets  # Needs assets for full workspace compile (Tauri resource bundling)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vm-assets
          path: assets/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: test

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Frontend type-check and build
        run: cd frontend && pnpm run check && pnpm run build

      - name: Unit tests (full workspace)
        run: cargo test --workspace

      # Check-only -- actual cross-compile already ran in build-assets on Linux
      - name: Cross-compile check (guest binaries)
        run: cargo check --release --target aarch64-unknown-linux-musl -p capsem-agent

  build-app:
    needs: test  # All tests must pass before we package a release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vm-assets
          path: assets/

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-app

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Install cargo-auditable and cargo-sbom
        run: cargo install cargo-auditable cargo-sbom --locked

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Write Apple API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"

      # Accumulate manifest.json: merge new version's entry with previous releases.
      - name: Build accumulated manifest
        run: |
          # Download previous manifest from latest release (may not exist for first release).
          gh release download --pattern manifest.json -D /tmp/prev-manifest 2>/dev/null || true
          if [ -f /tmp/prev-manifest/manifest.json ]; then
            # Merge: add all previous releases to new manifest, preserving new entries.
            python3 -c "
          import json, sys
          with open('assets/manifest.json') as f:
              new = json.load(f)
          with open('/tmp/prev-manifest/manifest.json') as f:
              prev = json.load(f)
          for ver, entry in prev.get('releases', {}).items():
              if ver not in new['releases']:
                  new['releases'][ver] = entry
          with open('assets/manifest.json', 'w') as f:
              json.dump(new, f, indent=2)
          print(f'Merged manifest: {len(new[\"releases\"])} releases')
          "
          else
            echo "No previous manifest found, using fresh manifest"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build thin DMG: exclude rootfs from bundle (downloaded on first launch).
      # The TAURI_CONFIG override ensures only vmlinuz, initrd.img, and manifest.json
      # are bundled, keeping the DMG under ~25 MB.
      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          tagName: v__VERSION__
          releaseName: 'Capsem v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          projectPath: crates/capsem-app
          args: --skip-stapling --config '{"bundle":{"resources":{"../../assets/vmlinuz":"vmlinuz","../../assets/initrd.img":"initrd.img","../../assets/manifest.json":"manifest.json"}}}'

      # Upload rootfs and manifest as separate release assets (not in the DMG).
      # The asset manager downloads rootfs on first launch via the manifest.
      - name: Upload rootfs and manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/rootfs.squashfs
            assets/manifest.json
          tag_name: ${{ github.ref_name }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ github.workspace }}/target/release/bundle/dmg/*.dmg

      - name: Generate SBOM
        run: cargo sbom --output-format spdx_json_2_3 > capsem-sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: ${{ github.workspace }}/target/release/bundle/dmg/*.dmg
          sbom-path: capsem-sbom.spdx.json
