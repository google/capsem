name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  attestations: write
  deployments: write
  id-token: write

env:
  ASSET_MANIFEST_URL: https://release.capsem.org/assets/stable/manifest.json

jobs:
  preflight:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Import Apple certificate (preflight)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          KEYCHAIN="preflight-$$.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID" || true)
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID signing identity found. Check APPLE_CERTIFICATE secret."
            echo "::error::If the p12 was created with OpenSSL 3.x, it uses PBES2/AES encryption."
            echo "::error::macOS requires legacy 3DES. Re-export with: scripts/fix_p12_legacy.sh"
            exit 1
          fi
          echo "codesigning identities:"
          echo "$IDENTITY"
          # Installer cert is not a codesigning identity; check with full list.
          INSTALLER=$(security find-identity -v "$KEYCHAIN" | grep "Developer ID Installer" || true)
          if [ -z "$INSTALLER" ]; then
            echo "::error::No Developer ID Installer identity found. productsign (.pkg signing) will fail."
            echo "::error::Export a combined p12 containing both Application and Installer certs."
            exit 1
          fi
          echo "installer identity: $INSTALLER"
          security delete-keychain "$KEYCHAIN"
          rm cert.p12

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "Tauri signing key is set"

      - name: Verify notarization credentials
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          if [ -z "$APPLE_API_ISSUER" ] || [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_KEY_CONTENT" ]; then
            echo "::error::Notarization secrets missing (APPLE_API_ISSUER, APPLE_API_KEY, or APPLE_API_KEY_PATH)"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          xcrun notarytool history \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            >/dev/null 2>&1 \
            && echo "Notarization credentials verified (notarytool history succeeded)" \
            || { echo "::error::notarytool history failed -- check APPLE_API_ISSUER, APPLE_API_KEY, and APPLE_API_KEY_PATH secrets"; exit 1; }
          rm -rf "$RUNNER_TEMP/private_keys"
  test:
    needs: preflight
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: test

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: bash scripts/generate-settings.sh
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Dependency audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
          # pnpm audit: block on high/critical only. Moderate findings in
          # dev-only transitive deps (e.g. postcss via vite) keep appearing
          # between releases and don't reflect runtime exposure for Capsem.
          cd frontend && pnpm audit --audit-level=high

      - name: Frontend type-check, test, and build
        run: cd frontend && pnpm run check && pnpm run test && pnpm run build

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Warnings-as-errors (all crates)
        run: cargo check --workspace

      - name: Create stub v2 asset manifest for unit tests
        run: |
          mkdir -p assets/arm64 assets/x86_64
          cat > assets/manifest.json <<'JSON'
          {
            "format": 2,
            "assets": {
              "current": "ci-stub",
              "releases": {
                "ci-stub": {
                  "date": "1970-01-01",
                  "deprecated": false,
                  "min_binary": "0.0.0",
                  "arches": {
                    "arm64": {},
                    "x86_64": {}
                  }
                }
              }
            },
            "binaries": {
              "current": "0.0.0",
              "releases": {
                "0.0.0": {
                  "date": "1970-01-01",
                  "deprecated": false,
                  "min_assets": "ci-stub"
                }
              }
            }
          }
          JSON

      - name: Unit tests with coverage
        run: |
          cargo llvm-cov --workspace --no-cfg-coverage --codecov --output-path codecov.json 2>&1 | tee test-output.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Test summary
        if: always()
        run: |
          # Parse "test result: ok. X passed; Y failed" lines from cargo output
          TESTS=$(grep -o '[0-9]* passed' test-output.txt 2>/dev/null | awk '{s+=$1} END {print s+0}')
          FAILED=$(grep -o '[0-9]* failed' test-output.txt 2>/dev/null | awk '{s+=$1} END {print s+0}')

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Test Results

          | Metric | Result |
          |--------|--------|
          | Rust tests passed | $TESTS |
          | Rust tests failed | $FAILED |
          | Frontend tests | vitest |
          | Audit | cargo audit + pnpm audit |
          EOF

  test-install:
    needs: preflight
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - uses: extractions/setup-just@v3

      - name: Install Linux host-build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            pkg-config \
            build-essential

      - name: Build host builder Docker image
        run: just build-host-image

      - name: Run install e2e tests
        run: just test-install

  build-app-macos:
    needs: [preflight, test, test-install]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-app-macos

      - name: Materialize runtime config
        run: |
          cargo run -p capsem-admin -- profile materialize \
            --profile config/profiles/code/profile.toml \
            --config-root config \
            --manifest "$ASSET_MANIFEST_URL" \
            --assets-dir assets \
            --output-root target/config \
            --arch arm64 \
            --clean

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Install cargo tools
        env:
          CARGO_NET_RETRY: 10
        run: |
          install_cargo_tool() {
            tool="$1"
            for attempt in 1 2 3; do
              if cargo install "$tool" --locked; then
                return 0
              fi
              echo "cargo install $tool failed on attempt $attempt/3"
              sleep $((attempt * 15))
            done
            return 1
          }

          install_cargo_tool tauri-cli
          install_cargo_tool cargo-auditable
          install_cargo_tool cargo-sbom

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')

      - name: Write Apple API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"

      - name: Validate build context completeness
        run: |
          uv run python3 -c "
          from capsem.builder.doctor import check_source_files
          from pathlib import Path
          result = check_source_files(Path('.'))
          if not result.passed:
              raise SystemExit(f'Source file check failed: {result.detail}')
          print(f'OK: {result.detail}')
          "

      - name: Build and sign app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          cd crates/capsem-app
          cargo tauri build --bundles app --skip-stapling

      - name: Build companion binaries
        run: |
          cargo build --release \
            -p capsem \
            -p capsem-service \
            -p capsem-process \
            -p capsem-tui \
            -p capsem-mcp \
            -p capsem-mcp-aggregator \
            -p capsem-mcp-builtin \
            -p capsem-gateway \
            -p capsem-tray \
            -p capsem-admin

      - name: Codesign companion binaries
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bin in capsem capsem-service capsem-process capsem-tui capsem-mcp capsem-mcp-aggregator capsem-mcp-builtin capsem-gateway capsem-tray capsem-admin; do
            codesign --sign "$APPLE_SIGNING_IDENTITY" \
              --options runtime \
              --timestamp \
              --entitlements entitlements.plist \
              --force \
              "target/release/$bin"
          done

      - name: Build .pkg installer
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-pkg.sh \
            --manifest "$ASSET_MANIFEST_URL" \
            "target/release/bundle/macos/Capsem.app" \
            "target/release" \
            "assets" \
            "target/config" \
            "$VERSION" \
            "${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}"

      - name: Notarize and staple .pkg
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcrun notarytool submit "packages/Capsem-$VERSION.pkg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 30m
          xcrun stapler staple "packages/Capsem-$VERSION.pkg"
          xcrun stapler validate "packages/Capsem-$VERSION.pkg"

      - name: Generate SBOM
        run: cargo sbom --output-format spdx_json_2_3 > capsem-sbom.spdx.json

      - name: Collect macOS artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-artifacts
          if [ ! -f "packages/Capsem-$VERSION.pkg" ]; then
            echo "::error::Capsem-$VERSION.pkg not produced by build-pkg.sh"
            exit 1
          fi
          cp "packages/Capsem-$VERSION.pkg" release-artifacts/
          cp capsem-sbom.spdx.json release-artifacts/
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: release-artifacts/

  build-app-linux:
    needs: [preflight, test, test-install]
    # Linux release is best-effort for now. See sprints/linux/tracker.md --
    # macOS .pkg is the shipping artifact until Linux is verified end-to-end.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
            bundles: deb
          - arch: x86_64
            runner: ubuntu-24.04
            bundles: deb
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-app-linux-${{ matrix.arch }}

      - name: Materialize runtime config
        run: |
          cargo run -p capsem-admin -- profile materialize \
            --profile config/profiles/code/profile.toml \
            --config-root config \
            --manifest "$ASSET_MANIFEST_URL" \
            --assets-dir assets \
            --output-root target/config \
            --arch ${{ matrix.arch }} \
            --clean

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            xdg-utils \
            xvfb

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Install cargo tools
        env:
          CARGO_NET_RETRY: 10
        run: |
          install_cargo_tool() {
            tool="$1"
            for attempt in 1 2 3; do
              if cargo install "$tool" --locked; then
                return 0
              fi
              echo "cargo install $tool failed on attempt $attempt/3"
              sleep $((attempt * 15))
            done
            return 1
          }

          install_cargo_tool tauri-cli
          install_cargo_tool cargo-auditable

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd crates/capsem-app
          cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Build companion binaries
        run: |
          cargo build --release -p capsem -p capsem-service -p capsem-process -p capsem-tui -p capsem-mcp -p capsem-mcp-aggregator -p capsem-mcp-builtin -p capsem-gateway -p capsem-tray -p capsem-admin

      - name: Repack .deb with companion binaries
        run: |
          DEB_FILE=$(ls target/release/bundle/deb/*.deb)
          bash scripts/repack-deb.sh --manifest "$ASSET_MANIFEST_URL" "$DEB_FILE" "target/release" "target/config" "assets"

      - name: Validate artifacts
        run: |
          echo "=== Validate deb ==="
          dpkg-deb --info target/release/bundle/deb/*.deb
          echo "=== Verify companion binaries in deb ==="
          dpkg-deb --contents target/release/bundle/deb/*.deb | grep -E "capsem-service|capsem-tui|capsem-mcp-aggregator|capsem-mcp-builtin|capsem-gateway|capsem-tray|capsem-admin"

      - name: Boot test (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          ls -l /dev/kvm || echo "KVM MISSING (pre-udev)"
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm
          # Probe KVM capability: nested/restricted KVM may lack CPUID support
          # which makes full VM boot impossible. Skip gracefully.
          if python3 -c "
          import fcntl, os, struct, array
          kvm = os.open('/dev/kvm', os.O_RDWR)
          vm = fcntl.ioctl(kvm, 0xAE01)  # KVM_CREATE_VM
          buf = struct.pack('II', 256, 0) + b'\x00' * (256 * 40)
          try:
              fcntl.ioctl(vm, 0xC008AE05, buf, True)  # KVM_GET_SUPPORTED_CPUID
              print('KVM supports CPUID -- boot test will run')
          except OSError as e:
              print(f'KVM lacks CPUID support ({e}) -- skipping boot test')
              os._exit(1)
          finally:
              os.close(vm); os.close(kvm)
          "; then
            sudo dpkg -i target/release/bundle/deb/*.deb || sudo apt-get install -f -y
            xvfb-run timeout 120 capsem run "capsem-doctor"
          else
            echo "::warning::Skipping x86_64 boot test -- KVM on this runner lacks full VM support"
          fi

      - name: Collect Linux artifacts
        run: |
          mkdir -p release-artifacts
          cp target/release/bundle/deb/*.deb release-artifacts/
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-${{ matrix.arch }}
          path: release-artifacts/

  create-release:
    needs: [test, test-install, build-app-macos, build-app-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Download all platform artifacts. macOS is required; Linux is best-effort.
      - uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-arm64
          path: release-artifacts/
        continue-on-error: true
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-x86_64
          path: release-artifacts/
        continue-on-error: true

      - name: Attest build provenance (pkg + deb)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release-artifacts/*.pkg
            release-artifacts/*.deb

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            release-artifacts/*.pkg
            release-artifacts/*.deb
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: release-artifacts/capsem-sbom.spdx.json

      - name: Build summary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG=$(ls -1 release-artifacts/*.pkg 2>/dev/null | head -1)
          PKG_NAME=$(basename "$PKG" 2>/dev/null || echo "N/A")
          PKG_SIZE=$(du -h "$PKG" 2>/dev/null | cut -f1 || echo "N/A")
          SBOM_PKGS=$(python3 -c "import json; d=json.load(open('release-artifacts/capsem-sbom.spdx.json')); print(len(d.get('packages',[])))" 2>/dev/null || echo "?")

          # Build artifact table rows for all debs (may be absent if Linux best-effort failed)
          LINUX_ROWS=""
          for f in release-artifacts/*.deb; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            SIZE=$(du -h "$f" | cut -f1)
            LINUX_ROWS="${LINUX_ROWS}| ${NAME} | ${SIZE} |
          "
          done
          [ -z "$LINUX_ROWS" ] && LINUX_ROWS="| (no .deb produced -- Linux best-effort) | -- |
          "

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Release $VERSION

          ### Artifacts

          | File | Size |
          |------|------|
          | $PKG_NAME | $PKG_SIZE |
          ${LINUX_ROWS}| Asset manifest | $ASSET_MANIFEST_URL |
          | capsem-sbom.spdx.json | $SBOM_PKGS packages |

          ### Security

          - Apple codesigned (Developer ID), notarized + stapled (.pkg)
          - SLSA build provenance attested (pkg + deb)
          - SBOM attested (SPDX 2.3, pkg + deb)
          - VM assets are served by the manual asset workflow through release.capsem.org
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          NOTES="${NOTES}

          ### VM Assets

          VM assets are released independently at ${ASSET_MANIFEST_URL}.
          "

          # Create release with the .pkg, then upload optional .deb
          # files if Linux build succeeded (best-effort until sprints/linux lands).
          gh release create ${{ github.ref_name }} \
            release-artifacts/*.pkg \
            release-artifacts/capsem-sbom.spdx.json \
            --title "Capsem ${{ github.ref_name }}" \
            --notes "$NOTES"

          for deb in release-artifacts/*.deb; do
            [ -f "$deb" ] && gh release upload ${{ github.ref_name }} "$deb"
          done

  assemble-release-channel:
    needs: [create-release]
    runs-on: ubuntu-latest
    outputs:
      dist_artifact: binary-channel-preview
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: release-site/pnpm-lock.yaml
      - name: Install release site dependencies
        run: cd release-site && pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-channel-binary

      - uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-arm64
          path: release-artifacts/
        continue-on-error: true
      - uses: actions/download-artifact@v8
        with:
          name: release-linux-x86_64
          path: release-artifacts/
        continue-on-error: true

      - name: Verify binary channel artifacts
        run: |
          set -euo pipefail
          if [ ! -f release-artifacts/capsem-sbom.spdx.json ]; then
            echo "::error::release-artifacts/capsem-sbom.spdx.json missing"
            exit 1
          fi
          package_found=false
          for file in release-artifacts/*.pkg release-artifacts/*.deb; do
            if [ -f "$file" ]; then
              package_found=true
              break
            fi
          done
          if [ "$package_found" != true ]; then
            echo "::error::no installable host package artifact found"
            exit 1
          fi

      - name: Fetch current asset channel manifest
        run: |
          mkdir -p target/binary-channel
          curl -fsSL "$ASSET_MANIFEST_URL" -o target/binary-channel/manifest.json

      - name: Record binary release metadata in channel manifest
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT_ARGS=()
          for file in release-artifacts/*.pkg release-artifacts/*.deb release-artifacts/capsem-sbom.spdx.json; do
            [ -f "$file" ] && ARTIFACT_ARGS+=(--artifact "$file")
          done
          cargo run -p capsem-admin -- assets channel record-binary \
            --manifest-path target/binary-channel/manifest.json \
            --version "$VERSION" \
            "${ARTIFACT_ARGS[@]}"

      - name: Verify binary release lane policy
        run: |
          uv run pytest \
            tests/capsem-release/test_binary_lane_gate.py \
            tests/capsem-release/test_release_lane_diff_policy.py -q

      - name: Build release channel with existing VM assets
        run: |
          cargo run -p capsem-admin -- assets channel build \
            --manifest "file://$PWD/target/binary-channel/manifest.json" \
            --asset-source-base "https://github.com/google/capsem/releases/download/assets-v{asset_version}" \
            --channel stable \
            --manifest-version "1.0.${{ github.run_number }}" \
            --out-dir target/release-channel

      - name: Build release site pages
        env:
          CAPSEM_RELEASE_CHANNEL_DIST: ${{ github.workspace }}/target/release-channel
        run: cd release-site && pnpm run build:channel

      - name: Check binary-updated release channel
        run: |
          cargo run -p capsem-admin -- assets channel check \
            --channel stable \
            --dist target/release-channel

      - uses: actions/upload-artifact@v7
        with:
          name: binary-channel-preview
          path: target/release-channel/

  deploy-release-channel:
    needs: [assemble-release-channel]
    uses: ./.github/workflows/release-channel.yaml
    with:
      channel: stable
      dist_artifact: binary-channel-preview
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Post-release: verify the public asset channel remains reachable, then prove
  # the just-released .deb can hydrate VM assets from release.capsem.org.
  # ---------------------------------------------------------------------------
  verify-release-downloads:
    needs: [deploy-release-channel]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5

      - name: Wait for release assets to be queryable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "${{ github.ref_name }}" --json assets --jq '.assets | length' >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Verify every URL in the asset channel manifest is reachable
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify
          curl -fsSL "$ASSET_MANIFEST_URL" -o /tmp/verify/manifest.json
          fail=0
          # Iterate every (arch, logical_name, hash) the current asset release declares.
          while IFS=$'\t' read -r asset_version arch name hash url; do
            code=$(curl -sIL -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              echo "::error::$url -> HTTP $code"
              fail=1
            else
              echo "ok  $url"
            fi
            blob="/tmp/verify/$asset_version-$arch-$name"
            if ! curl -fsSL "$url" -o "$blob"; then
              echo "::error::$url download failed"
              fail=1
              continue
            fi
            expected_hash="${hash#blake3:}"
            if ! uv run python3 - "$blob" "$expected_hash" <<'PY'
          import pathlib
          import sys

          import blake3

          path = pathlib.Path(sys.argv[1])
          expected = sys.argv[2]
          actual = blake3.blake3(path.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(1)
          PY
            then
              echo "::error::$url blake3 mismatch"
              fail=1
            fi
          done < <(python3 -c "
          import json
          import os
          from urllib.parse import urlparse

          m = json.load(open('/tmp/verify/manifest.json'))
          manifest = urlparse(os.environ['ASSET_MANIFEST_URL'])
          manifest_origin = f'{manifest.scheme}://{manifest.netloc}'
          asset_base = m.get('asset_base') or '/assets/releases'

          def asset_url(asset_version, arch, name):
              base = asset_base.rstrip('/')
              if '{asset_version}' in base:
                  version_base = base.replace('{asset_version}', asset_version)
              else:
                  version_base = f'{base}/{asset_version}'
              if version_base.startswith('/'):
                  version_base = f'{manifest_origin}{version_base}'
              return f'{version_base.rstrip(\"/\")}/{arch}-{name}'

          cur = m['assets']['current']
          for arch, files in m['assets']['releases'][cur]['arches'].items():
              for name, meta in files.items():
                  print(f'{cur}\t{arch}\t{name}\t{meta[\"hash\"]}\t{asset_url(cur, arch, name)}')
          ")
          [ "$fail" = 0 ] || { echo '::error::one or more asset URLs are unreachable or hash-mismatched'; exit 1; }

      - name: Verify capsem update --assets succeeds against release.capsem.org
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pull the just-released .deb for this runner's arch.
          arch=$(uname -m)
          [ "$arch" = "aarch64" ] && deb_arch=arm64 || deb_arch=amd64
          mkdir -p /tmp/deb
          if ! gh release download "${{ github.ref_name }}" \
               --pattern "Capsem_*_${deb_arch}.deb" -D /tmp/deb; then
            echo "::error::no .deb for ${deb_arch} on this release"
            exit 1
          fi
          deb=$(ls /tmp/deb/Capsem_*_${deb_arch}.deb | head -1)
          # Extract the bundled capsem binary; we don't need to dpkg -i for this.
          mkdir -p /tmp/extract && cd /tmp/extract
          ar x "$deb"
          for d in data.tar.zst data.tar.xz data.tar.gz; do
            [ -f "$d" ] && tar xf "$d" && break
          done
          # Tauri .deb installs the umbrella binary as capsem-app; the CLI is
          # bundled separately under /usr/share/capsem/bin or similar. Find it.
          CAPSEM_BIN=$(find . -type f -name capsem -perm -u+x | head -1)
          if [ -z "$CAPSEM_BIN" ]; then
            echo "::error::no 'capsem' CLI inside .deb"
            exit 1
          fi
          echo "Using $CAPSEM_BIN ($("$CAPSEM_BIN" --version 2>&1 | head -1))"

          # Stand up a clean CAPSEM_HOME with the packaged manifest/provenance.
          export CAPSEM_HOME=/tmp/capsem-home
          mkdir -p "$CAPSEM_HOME/assets"
          cp ./usr/share/capsem/assets/manifest.json "$CAPSEM_HOME/assets/manifest.json"
          cp ./usr/share/capsem/assets/manifest-origin.json "$CAPSEM_HOME/assets/manifest-origin.json"
          "$CAPSEM_BIN" update --assets
          # Sanity: at least the host arch's three canonical files must now exist.
          host_arch=$( [ "$arch" = "aarch64" ] && echo arm64 || echo x86_64 )
          for f in vmlinuz initrd.img rootfs.erofs; do
            count=$(find "$CAPSEM_HOME/assets/$host_arch" -name "${f%.*}-*" 2>/dev/null | wc -l)
            [ "$count" -ge 1 ] || { echo "::error::no downloaded file for $f"; exit 1; }
          done
          echo "End-to-end download verified against release.capsem.org."
