name: CI
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile

      # capsem-app requires VM assets to compile (Tauri resource bundling),
      # so we test the library crates only. Full workspace test runs in release.
      - name: Unit tests (library crates)
        run: cargo test -p capsem-core -p capsem-agent -p capsem-logger -p capsem-proto

      # Check-only (no link) -- actual cross-compile runs on Linux in release workflow
      - name: Cross-compile check (guest binaries)
        run: cargo check --release --target aarch64-unknown-linux-musl -p capsem-agent

      - name: Frontend type-check and build
        run: cd frontend && pnpm run check && pnpm run build
