name: CI
on:
  pull_request:
  push:
    branches: [main]

# A new PR push supersedes the older run for that PR. Main runs are never
# cancelled: each merged commit keeps its own post-merge signal.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Linux: compile + test KVM hypervisor backend (cfg(target_os = "linux"))
  # ---------------------------------------------------------------------------
  test-linux:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
          components: llvm-tools

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      # Try to enable KVM for integration tests. GitHub-hosted runners don't
      # always expose nested virt -- when /dev/kvm is absent the udev trigger
      # fails with "Failed to open the device 'kvm': Invalid argument". We
      # let that pass and fall through to a compile-only/no-KVM run; the
      # release pipeline owns real-KVM coverage. See sprints/done/ci-green.
      - name: Enable KVM (best-effort)
        continue-on-error: true
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install prebuilt Rust tools
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b
        with:
          tool: cargo-nextest@0.9.137,cargo-llvm-cov@0.8.5

      # Library + service crate tests with coverage (capsem-core includes KVM backend on Linux).
      # capsem-app (Tauri shell) and capsem-tray (macOS muda menu-bar) are macOS-only; every
      # other host crate is portable and runs here so it gets Linux-specific regression coverage.
      - name: Unit tests (KVM backend) with coverage
        timeout-minutes: 45
        run: just test-linux-rust

      - name: Upload Linux coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: codecov-linux.json
          flags: linux-unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # Note KVM exercise status. Hosted ARM runners may lack /dev/kvm; the
      # compile-only path still catches Linux build/lint regressions, and
      # real-KVM coverage runs in the release pipeline. Surfacing as a
      # warning (not an error) keeps CI honest about what was actually
      # exercised without false-failing on a runner-fleet limitation.
      - name: Note KVM exercise status
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM is available at /dev/kvm -- KVM-backed tests exercised."
          else
            echo "::warning::/dev/kvm not available on this runner -- compile + non-KVM tests only. Real-KVM coverage runs in release pipeline."
          fi

      - name: Test summary
        if: always()
        run: |
          KVM_STATUS="available"
          [ -e /dev/kvm ] || KVM_STATUS="not available"
          COV=$(grep 'TOTAL' coverage-summary-linux.txt 2>/dev/null | awk '{print $(NF)}' || echo "?")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Linux Test Results

          | Metric | Result |
          |--------|--------|
          | Runner | ubuntu-24.04-arm (aarch64) |
          | /dev/kvm | $KVM_STATUS |
          | Line coverage | $COV |
          | KVM backend | compiled (real-KVM tests run only when /dev/kvm is present) |
          EOF

      # T5: preserve test artifacts on failure (Linux job).
      - name: Upload test artifacts on failure (Linux)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-artifacts-linux-${{ github.run_attempt }}
          path: |
            test-artifacts/
            frontend/test-artifacts/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # macOS: full test suite (Apple VZ backend, frontend, Python, coverage)
  # ---------------------------------------------------------------------------
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
          targets: aarch64-unknown-linux-musl,x86_64-unknown-linux-musl
          components: llvm-tools

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            release-site/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - run: uv sync
      - run: bash scripts/generate-settings.sh
      - run: bash scripts/prepare-install-test-assets.sh
      - run: bash scripts/materialize-config.sh
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: bash scripts/check-web-surface.sh frontend-build
      - name: Install release site dependencies
        run: cd release-site && pnpm install --frozen-lockfile

      - name: Frontend dependency audit
        run: python3 scripts/audit-pnpm-bulk.py --project-dir frontend

      - name: Install prebuilt Rust tools
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b
        with:
          tool: cargo-llvm-cov@0.8.5,cargo-nextest@0.9.137,b3sum@1.8.5

      - name: Install sha256sum compatibility wrapper
        run: |
          if ! command -v sha256sum >/dev/null 2>&1; then
            mkdir -p "$HOME/.local/bin"
            printf '%s\n' '#!/bin/sh' 'exec shasum -a 256 "$@"' > "$HOME/.local/bin/sha256sum"
            chmod +x "$HOME/.local/bin/sha256sum"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      # Unit tests: all crates with coverage + JUnit XML for test analytics.
      # capsem-app (Tauri bin) is macOS-only; capsem-mcp-aggregator and
      # capsem-mcp-builtin are thin binaries that pull capsem-core logic.
      - name: Unit tests with coverage
        run: |
          cargo llvm-cov nextest --no-cfg-coverage --bins --profile ci --codecov --output-path codecov-unit.json -p capsem-core -p capsem-admin -p capsem-agent -p capsem-logger -p capsem-proto -p capsem-guard -p capsem-gateway -p capsem-service -p capsem -p capsem-tui -p capsem-mcp -p capsem-mcp-aggregator -p capsem-mcp-builtin -p capsem-tray -p capsem-app -p capsem-process -p capsem-bench -p capsem-mock-server
          cargo llvm-cov report --bins --summary-only -p capsem-core -p capsem-admin -p capsem-agent -p capsem-logger -p capsem-proto -p capsem-guard -p capsem-gateway -p capsem-service -p capsem -p capsem-tui -p capsem-mcp -p capsem-mcp-aggregator -p capsem-mcp-builtin -p capsem-tray -p capsem-app -p capsem-process -p capsem-bench -p capsem-mock-server 2>&1 | tee coverage-summary.txt

      # Integration tests (tests/ directory, cross-crate)
      - name: Integration tests with coverage
        run: |
          cargo llvm-cov nextest --no-cfg-coverage --profile ci --codecov --output-path codecov-integration.json -p capsem-core --test '*'

      # Frontend tests with coverage + JUnit output
      - name: Frontend type-check, test, and build
        env:
          CAPSEM_FRONTEND_JUNIT: ../frontend-junit.xml
        run: bash scripts/check-web-surface.sh frontend

      # Python schema tests with coverage
      - name: Python lint and type check
        run: |
          uv run ruff check .
          uv run ty check src/capsem
          uv run capsem-builder validate-skills skills

      - name: Python schema tests with coverage
        run: |
          uv run python -m pytest \
            tests/test_agent_skill_index.py \
            tests/test_audit.py \
            tests/test_build_pkg.py \
            tests/test_capsem_bench_mock_server_protocol.py \
            tests/test_capsem_bench_storage.py \
            tests/test_cli.py \
            tests/test_config.py \
            tests/test_docker.py \
            tests/test_doctor.py \
            tests/test_image_build_backend.py \
            tests/test_manifest.py \
            tests/test_mock_server_launcher.py \
            tests/test_models.py \
            tests/test_protocol_fixture_recorder.py \
            tests/test_repack_deb.py \
            tests/test_settings_spec.py \
            tests/test_skills.py \
            tests/test_validate.py \
            tests/capsem-cleanup-script/test_clean_stale.py \
            tests/capsem-rootfs-artifacts/test_rootfs_artifacts.py \
            --cov=src/capsem \
            --cov-report=xml:codecov-python.xml \
            --cov-fail-under=90 \
            --junitxml=python-junit.xml

      # Python integration tests that need no VM
      - name: Python integration tests (non-VM suites)
        run: |
          bash scripts/prepare-install-test-assets.sh
          cargo build -p capsem-process -p capsem-service -p capsem -p capsem-mcp -p capsem-mock-server -p capsem-bench
          for bin in target/debug/capsem-process target/debug/capsem-service target/debug/capsem target/debug/capsem-mcp target/debug/capsem-mock-server target/debug/capsem-bench-rs; do
            codesign --sign - --entitlements entitlements.plist --force "$bin"
          done
          uv run python -m pytest tests/capsem-bootstrap/ \
            tests/capsem-codesign/ \
            tests/capsem-rootfs-artifacts/ \
            tests/capsem-release/ \
            -v --tb=short \
            --cov=src/capsem \
            --cov-append \
            --cov-report=xml:codecov-python.xml

      # Verify all integration test suites import cleanly (catches broken imports/syntax)
      - name: Verify all integration test imports
        run: |
          uv run python -m pytest tests/capsem-*/ --collect-only -q

      # Schema drift check
      - name: Schema drift check
        run: |
          uv run python scripts/generate_schema.py
          git diff --exit-code config/settings/schema.generated.json \
            config/settings/ui-metadata.generated.json \
            frontend/src/lib/mock-settings.generated.ts

      # Upload coverage with flags
      - name: Upload Rust unit test coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: codecov-unit.json
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload Rust integration test coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: codecov-integration.json
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload frontend coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: frontend/coverage/coverage-final.json
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload Python coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: codecov-python.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # Upload test results for test analytics
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3
        with:
          files: target/nextest/ci/junit.xml,frontend-junit.xml,python-junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # T5: preserve every test artifact (service.log / process.log /
      # session.db etc.) on failure so PR reviewers can debug without
      # rerunning. preserve_tmp_dir_on_failure() in tests/helpers/service.py
      # populates `test-artifacts/` only on red runs; if-no-files-found
      # is "ignore" so green runs don't bloat the workflow.
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-artifacts-${{ runner.os }}-${{ github.run_attempt }}
          path: |
            test-artifacts/
            frontend/test-artifacts/
          retention-days: 7
          if-no-files-found: ignore

      # Check-only (no link) -- actual cross-compile runs on Linux in release workflow
      - name: Cross-compile check (guest binaries)
        run: |
          cargo check --release --target aarch64-unknown-linux-musl -p capsem-agent
          cargo check --release --target x86_64-unknown-linux-musl -p capsem-agent

      - name: Test summary
        if: always()
        run: |
          COV=$(grep 'TOTAL' coverage-summary.txt 2>/dev/null | awk '{print $(NF)}' || echo "?")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Test Results

          | Metric | Result |
          |--------|--------|
          | Line coverage | $COV |
          | Test results | See Codecov test analytics |
          | Cross-compile | aarch64-unknown-linux-musl |
          | Audit | npm bulk advisory API (RustSec runs in security-audit.yaml) |

          > Coverage covers library crates + gateway (capsem-core, agent, logger, proto, gateway).
          > Full workspace coverage runs in the release pipeline.
          EOF

  # ---------------------------------------------------------------------------
  # Install e2e: Docker-based install layout + systemd tests (Linux)
  # ---------------------------------------------------------------------------
  test-install:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b

      - name: Build host builder Docker image
        run: just build-host-image

      - name: Run install e2e tests
        run: just test-install

  # ---------------------------------------------------------------------------
  # Web: build docs and marketing before pr-gate can pass
  # ---------------------------------------------------------------------------
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: cd docs && pnpm install --frozen-lockfile

      - name: Build docs
        run: bash scripts/check-web-surface.sh docs

  site-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install site dependencies
        run: cd site && pnpm install --frozen-lockfile

      - name: Build site
        run: bash scripts/check-web-surface.sh site

  release-site-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: release-site/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: release-site-build

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install release site dependencies
        run: cd release-site && pnpm install --frozen-lockfile

      - name: Release site type-check, coverage, and generated channel build
        run: bash scripts/check-web-surface.sh release-site

      - name: Upload release site coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: release-site/coverage/lcov.info
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Stable branch-protection check: one required status for the real PR gate.
  # ---------------------------------------------------------------------------
  pr-gate:
    runs-on: ubuntu-latest
    needs: [test-linux, test, test-install, docs-build, site-build, release-site-build]
    if: ${{ always() }}
    steps:
      - name: Require all CI jobs
        env:
          TEST_LINUX_RESULT: ${{ needs.test-linux.result }}
          TEST_MACOS_RESULT: ${{ needs.test.result }}
          TEST_INSTALL_RESULT: ${{ needs.test-install.result }}
          DOCS_BUILD_RESULT: ${{ needs.docs-build.result }}
          SITE_BUILD_RESULT: ${{ needs.site-build.result }}
          RELEASE_SITE_BUILD_RESULT: ${{ needs.release-site-build.result }}
        run: |
          echo "test-linux:   $TEST_LINUX_RESULT"
          echo "test:         $TEST_MACOS_RESULT"
          echo "test-install: $TEST_INSTALL_RESULT"
          echo "docs-build:   $DOCS_BUILD_RESULT"
          echo "site-build:   $SITE_BUILD_RESULT"
          echo "release-site-build: $RELEASE_SITE_BUILD_RESULT"

          test "$TEST_LINUX_RESULT" = success
          test "$TEST_MACOS_RESULT" = success
          test "$TEST_INSTALL_RESULT" = success
          test "$DOCS_BUILD_RESULT" = success
          test "$SITE_BUILD_RESULT" = success
          test "$RELEASE_SITE_BUILD_RESULT" = success
