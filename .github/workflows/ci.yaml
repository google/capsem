name: CI
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile

      - name: Dependency audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
          cd frontend && pnpm audit

      - name: Install tools
        run: |
          cargo install cargo-llvm-cov --locked
          cargo install cargo-nextest --locked

      # capsem-app requires VM assets to compile (Tauri resource bundling),
      # so we test the library crates only. Full workspace test runs in release.

      # Unit tests: lib tests with coverage + JUnit XML for test analytics
      - name: Unit tests with coverage
        run: |
          cargo llvm-cov nextest --no-cfg-coverage --profile ci --codecov --output-path codecov-unit.json -p capsem-core -p capsem-agent -p capsem-logger -p capsem-proto
          cargo llvm-cov report --no-cfg-coverage --summary-only -p capsem-core -p capsem-agent -p capsem-logger -p capsem-proto 2>&1 | tee coverage-summary.txt

      # Integration tests (tests/ directory, cross-crate)
      - name: Integration tests with coverage
        run: |
          cargo llvm-cov nextest --no-cfg-coverage --profile ci --codecov --output-path codecov-integration.json -p capsem-core --test '*' || true

      # Frontend tests with JUnit output
      - name: Frontend type-check, test, and build
        run: |
          cd frontend
          pnpm run check
          pnpm run test -- --reporter=default --reporter=junit --outputFile=../frontend-junit.xml
          pnpm run build

      # Upload coverage with flags
      - name: Upload unit test coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: codecov-unit.json
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload integration test coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: codecov-integration.json
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # Upload test results for test analytics
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: target/nextest/ci/junit.xml,frontend-junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      # Check-only (no link) -- actual cross-compile runs on Linux in release workflow
      - name: Cross-compile check (guest binaries)
        run: cargo check --release --target aarch64-unknown-linux-musl -p capsem-agent

      - name: Test summary
        if: always()
        run: |
          COV=$(grep 'TOTAL' coverage-summary.txt 2>/dev/null | awk '{print $(NF)}' || echo "?")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Test Results

          | Metric | Result |
          |--------|--------|
          | Line coverage | $COV |
          | Test results | See Codecov test analytics |
          | Cross-compile | aarch64-unknown-linux-musl |
          | Audit | cargo audit + pnpm audit |

          > Coverage covers library crates only (capsem-core, agent, logger, proto).
          > Full workspace coverage runs in the release pipeline.
          EOF
