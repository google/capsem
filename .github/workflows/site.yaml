name: Publish Site
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build site
    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install
        run: cd site && pnpm install --frozen-lockfile
      - name: Build
        run: bash scripts/check-web-surface.sh site
      - name: Deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist/ --project-name=capsem
      - name: Smoke public marketing site
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          SITE_URL: https://capsem.org
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "Checking $SITE_URL (attempt $attempt)..."
            if curl -fsSLI "$SITE_URL/" -o /tmp/site-headers.txt \
              && grep -qi '^content-type: text/html' /tmp/site-headers.txt \
              && curl -fsSL "$SITE_URL/" -o /tmp/site-index.html \
              && grep -q "The fastest way to ship with AI securely." /tmp/site-index.html \
              && grep -q "A Rust-powered hypervisor" /tmp/site-index.html
            then
              echo "capsem.org smoke passed."
              exit 0
            fi
            sleep 10
          done

          echo "capsem.org smoke failed after deploy." >&2
          exit 1
