name: Security Audit
on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b
        with:
          tool: cargo-audit@0.22.1

      - name: Resolve the current Rust dependency graph
        run: cargo generate-lockfile

      - name: RustSec audit (blocking security signal)
        run: cargo audit

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: npm bulk advisory audit (blocking security signal)
        run: python3 scripts/audit-pnpm-bulk.py --project-dir frontend
