<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <!-- Central AI Sparkle Path -->
    <path id="ai-star" d="M 0 -45 C 0 -12 12 0 45 0 C 12 0 0 12 0 45 C 0 12 -12 0 -45 0 C -12 0 0 -12 0 -45 Z" />

    <!-- Orbital Crescent Path -->
    <path id="orbital-arc" d="M 26 -11 A 28 28 0 0 0 11 -26 A 48 48 0 0 1 26 -11 Z" />
  </defs>

  <g fill="#111827">
    <!-- Primary Star -->
    <use href="#ai-star" transform="translate(50, 50)" />

    <!-- Four orbital arcs -->
    <use href="#orbital-arc" transform="translate(50, 50)" />
    <use href="#orbital-arc" transform="translate(50, 50) rotate(90)" />
    <use href="#orbital-arc" transform="translate(50, 50) rotate(180)" />
    <use href="#orbital-arc" transform="translate(50, 50) rotate(270)" />

    <!-- Orbiting Companion Sparkles -->
    <use href="#ai-star" transform="translate(82, 18) scale(0.25) rotate(15)" />
    <use href="#ai-star" transform="translate(22, 78) scale(0.15) rotate(-15)" />
  </g>
</svg>
