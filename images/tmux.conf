# Capsem tmux configuration

# Enable mouse support (clicking to select panes/windows, resizing, scrolling)
set -g mouse on

# Use bash as the default shell
set -g default-shell /bin/bash

# Set scrollback buffer size
set -g history-limit 10000

# Start window and pane numbering at 1 (more ergonomic for keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Modern colors
set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:Tc"

# Status bar styling (minimalist)
set -g status-style bg=default,fg=white
set -g status-left-length 20
set -g status-left "#[fg=green,bold]capsem #[fg=white,nobold]| "
set -g status-right "#[fg=dim]#H"
setw -g window-status-current-style fg=cyan,bold
